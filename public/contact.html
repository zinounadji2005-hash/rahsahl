<!DOCTYPE html>
<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>اتصل بنا - راه ساهل</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{navy:'#0b1420',sky:'#0ea5e9',teal:'#14b8a6'},fontFamily:{ar:['IBM Plex Sans Arabic','sans-serif'],en:['Inter','sans-serif']}}}}</script>
<style>body{font-family:'Inter',sans-serif;background:var(--bg,#f5f0eb);color:var(--text,#334155)}h1,h2,h3{font-family:'IBM Plex Sans Arabic',sans-serif}.card{background:var(--card,#fff);border:1px solid var(--card-border,#e2e8f0);border-radius:16px}.btn-primary{background:linear-gradient(135deg,#0ea5e9,#14b8a6);color:#fff;transition:all 0.3s}.btn-primary:hover{box-shadow:0 8px 25px rgba(14,165,233,0.3)}.input-focus{border:1px solid var(--card-border,#e2e8f0);transition:all 0.2s;background:var(--input-bg,#fff)}.input-focus:focus{border-color:#0ea5e9;box-shadow:0 0 0 3px rgba(14,165,233,0.12);outline:none}#darkToggle{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:10px;border:1px solid var(--card-border,#e2e8f0);background:var(--card,#fff);cursor:pointer;transition:all 0.2s;color:var(--muted,#94a3b8)}#darkToggle:hover{color:var(--heading,#0b1420)}html.dark{--bg:#0b1420;--text:#dbe2f5;--heading:#f1f5f9;--muted:#88929b;--card:#18202d;--card-border:#2d3543;--input-bg:#141c29;--section-alt:#0b1420}html.dark .text-navy{color:var(--heading,#f1f5f9)!important}html.dark .text-slate-500{color:var(--muted,#88929b)!important}html.dark .text-slate-400{color:var(--muted,#88929b)!important}html.dark .text-slate-600{color:var(--heading,#cbd5e1)!important}html.dark .border-slate-200{border-color:var(--card-border,#2d3543)!important}html.dark .bg-white{background:var(--card,#18202d)!important}html.dark .bg-slate-50{background:var(--section-alt,#0b1420)!important}html.dark .bg-sky-100{background:rgba(14,165,233,0.15)!important}html.dark .bg-teal-100{background:rgba(20,184,166,0.12)!important}html.dark nav a img{filter:brightness(0) invert(1)}</style>
</head>
<body class="antialiased selection:bg-sky-200/50" style="background:var(--bg,#f5f0eb);color:var(--text,#334155)">
<nav class="bg-white border-b border-slate-200"><div class="max-w-4xl mx-auto flex items-center justify-between h-16 px-4"><a class="flex items-center gap-3" href="index.html"><img alt="RahSahl" class="h-9 w-auto" src="logo.svg"/></a><div class="flex items-center gap-3"><button id="darkToggle" title="الوضع الليلي"><span class="material-symbols-outlined dark:hidden text-[18px]">dark_mode</span><span class="material-symbols-outlined hidden dark:inline text-[18px]">light_mode</span></button><a class="text-[14px] font-semibold text-sky-600 hover:text-sky-700 transition-colors" href="index.html">الرجوع للرئيسية</a></div></div></nav>
<main class="max-w-4xl mx-auto px-4 py-12">
  <div class="card p-8 md:p-12"><h1 class="font-ar text-[32px] font-bold mb-2" style="color:var(--heading,#0b1420)">اتصل بنا</h1>
    <p class="text-[15px] mb-8" style="color:var(--muted,#64748b)">نحن هنا لمساعدتك. تواصل معنا بأي من الطرق التالية.</p>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
      <div class="p-6 bg-slate-50 rounded-2xl text-center"><div class="w-12 h-12 rounded-xl bg-sky-100 flex items-center justify-center mx-auto mb-4"><span class="material-symbols-outlined text-sky-500">mail</span></div><h3 class="font-ar text-[16px] font-bold mb-1" style="color:var(--heading,#0b1420)">البريد الإلكتروني</h3><p class="text-[14px]" style="color:var(--muted,#64748b)">hello@rahsahl.com</p></div>
      <div class="p-6 bg-slate-50 rounded-2xl text-center"><div class="w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-4" style="background:rgba(20,184,166,0.12)"><span class="material-symbols-outlined text-teal-500">chat</span></div><h3 class="font-ar text-[16px] font-bold mb-1" style="color:var(--heading,#0b1420)">واتساب</h3><p class="text-[14px]" style="color:var(--muted,#64748b)">+213 5XX XX XX XX</p></div>
      <div class="p-6 bg-slate-50 rounded-2xl text-center"><div class="w-12 h-12 rounded-xl bg-sky-100 flex items-center justify-center mx-auto mb-4"><span class="material-symbols-outlined text-sky-500">schedule</span></div><h3 class="font-ar text-[16px] font-bold mb-1" style="color:var(--heading,#0b1420)">أوقات العمل</h3><p class="text-[14px]" style="color:var(--muted,#64748b)">9:00 صباحاً - 6:00 مساءً</p></div>
    </div>
    <form class="space-y-4 max-w-lg mx-auto"><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label class="block text-[14px] font-semibold mb-1.5" style="color:var(--heading,#475569)">الاسم</label><input class="w-full input-focus text-[15px] rounded-xl py-3 px-4" style="color:var(--heading,#0b1420);background:var(--input-bg,#fff);border-color:var(--card-border,#e2e8f0)" placeholder="اسمك" type="text"/></div><div><label class="block text-[14px] font-semibold mb-1.5" style="color:var(--heading,#475569)">البريد الإلكتروني</label><input class="w-full input-focus text-[15px] rounded-xl py-3 px-4" style="color:var(--heading,#0b1420);background:var(--input-bg,#fff);border-color:var(--card-border,#e2e8f0)" dir="ltr" placeholder="name@example.com" type="email"/></div></div>
      <div><label class="block text-[14px] font-semibold mb-1.5" style="color:var(--heading,#475569)">الرسالة</label><textarea class="w-full input-focus text-[15px] rounded-xl py-3 px-4 min-h-[120px]" style="color:var(--heading,#0b1420);background:var(--input-bg,#fff);border-color:var(--card-border,#e2e8f0)" placeholder="كيف يمكننا مساعدتك؟"></textarea></div>
      <button class="btn-primary w-full text-[15px] font-semibold rounded-xl py-3" type="submit">إرسال الرسالة</button>
    </form>
  </div>
</main>
<footer class="border-t border-slate-200 py-6 text-center text-[13px]" style="color:var(--muted,#94a3b8)">© 2026 RahSahl</footer>
<script>(function(){var t=document.getElementById('darkToggle'),d=document.documentElement;if(localStorage.getItem('dark')==='true')d.classList.add('dark');t&&t.addEventListener('click',function(){d.classList.toggle('dark');localStorage.setItem('dark',d.classList.contains('dark'))})})();</script>
</body></html>
