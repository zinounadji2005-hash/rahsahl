<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>الطلبات — RahSahl</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{navy:'#0b1420',sky:'#0ea5e9',amber:'#f59e0b',teal:'#14b8a6'},fontFamily:{ar:['IBM Plex Sans Arabic','sans-serif'],en:['Inter','sans-serif']}}}}</script>
<style>
:root{--bg:#f5f0eb;--text:#334155;--heading:#0b1420;--muted:#64748b;--muted-400:#94a3b8;--card:#fff;--card-border:#e2e8f0;--card-hover-border:#cbd5e1;--input-bg:#fff;--input-border:#e2e8f0;--soft-sky:#e0f2fe;--soft-teal:#ccfbf1;--soft-amber:#fef3c7;--soft-slate:#f8fafc;--border-light:#e2e8f0;--hover-bg:rgba(14,165,233,0.04)}
html.dark{--bg:#0b1420;--text:#dbe2f5;--heading:#f1f5f9;--muted:#88929b;--muted-400:#6b7a8a;--card:#18202d;--card-border:#2d3543;--card-hover-border:#3e4850;--input-bg:#141c29;--input-border:#3e4850;--soft-sky:rgba(14,165,233,0.12);--soft-teal:rgba(20,184,166,0.12);--soft-amber:rgba(245,158,11,0.12);--soft-slate:#141c29;--border-light:#2d3543;--hover-bg:rgba(14,165,233,0.08)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);transition:background 0.3s,color 0.3s}
h1,h2,h3,h4{font-family:'IBM Plex Sans Arabic',sans-serif;color:var(--heading)}
.text-muted{color:var(--muted)}.text-heading{color:var(--heading)}
html.dark .text-navy{color:var(--heading)!important}
html.dark .text-slate-600{color:var(--text)!important}
html.dark .text-slate-400{color:var(--muted-400)!important}
html.dark .bg-white{background:var(--card)!important}
html.dark .bg-sky-100{background:var(--soft-sky)!important}
html.dark .bg-teal-100{background:var(--soft-teal)!important}
html.dark .bg-amber-100{background:var(--soft-amber)!important}
</style>
<link href="css/styles.css" rel="stylesheet"/>
</head>
<body>
<nav class="sidenav" id="sidenav"></nav>
<main class="main-content" id="main"></main>

<script src="js/supabase.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/api.js"></script>
<script src="js/sidebar.js"></script>
<script>
(async function () {
  var ctx = await window.RahSahl.authGuard.guard();
  if (!ctx) return;
  window.RahSahl.sidebar.boot();
  document.getElementById('sidenav').innerHTML = window.RahSahl.sidebar.renderSidebar(ctx);

  var currentStatus = 'all';
  var searchQuery = '';
  var currentOrders = [];

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function statusLabel(s) {
    return { pending: 'قيد الانتظار', confirmed: 'مأكّد', shipped: 'تم الشحن' }[s] || s;
  }

  function timeAgo(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return 'الآن';
    if (diff < 3600) return 'منذ ' + Math.floor(diff / 60) + ' د';
    if (diff < 86400) return 'منذ ' + Math.floor(diff / 3600) + ' س';
    if (diff < 604800) return 'منذ ' + Math.floor(diff / 86400) + ' يوم';
    return d.toLocaleDateString('ar-DZ');
  }

  function applyFilters() {
    var q = (searchQuery || '').toLowerCase();
    return currentOrders.filter(function (o) {
      if (currentStatus !== 'all' && o.order_status !== currentStatus) return false;
      if (!q) return true;
      return (o.customer_name || '').toLowerCase().indexOf(q) >= 0
        || (o.product_requested || '').toLowerCase().indexOf(q) >= 0
        || (o.location_city || '').toLowerCase().indexOf(q) >= 0
        || (o.sender_id || '').toLowerCase().indexOf(q) >= 0
        || (o.phone || '').toLowerCase().indexOf(q) >= 0;
    });
  }

  function renderPage() {
    var filtered = applyFilters();
    var rows = filtered.length === 0
      ? '<tr><td colspan="7" class="text-center py-12 text-slate-500">'
        + '<span class="material-symbols-outlined text-[40px] opacity-40">inbox</span>'
        + '<p class="mt-2 text-[14px]">لا توجد طلبات تطابق الفلاتر</p></td></tr>'
      : filtered.map(function (o) {
          return ''
            + '<tr>'
            + '  <td><div class="font-semibold text-navy">' + esc(o.customer_name || '—') + '</div>'
            + '    <div class="text-[12px] text-slate-400" dir="ltr">' + esc(o.phone || o.sender_id || '—') + '</div></td>'
            + '  <td><div class="text-navy">' + esc(o.product_requested || '—') + '</div>'
            + '    <div class="text-[12px] text-slate-400">الكمية: ' + esc(o.quantity || 1) + '</div></td>'
            + '  <td>' + esc(o.location_city || '—') + '</td>'
            + '  <td><span class="pill pill-' + o.order_status + '">' + statusLabel(o.order_status) + '</span></td>'
            + '  <td class="text-[12px] text-slate-500">' + timeAgo(o.created_at) + '</td>'
            + '  <td>'
            + (o.order_status === 'pending'
                ? '<button data-id="' + o.id + '" data-action="confirmed" class="btn-primary text-[12px] py-1.5 px-3 js-status">تأكيد</button>'
                : o.order_status === 'confirmed'
                  ? '<button data-id="' + o.id + '" data-action="shipped" class="btn-primary text-[12px] py-1.5 px-3 js-status">شحن</button>'
                  : '<span class="text-[12px] text-slate-400">—</span>')
            + '  </td>'
            + '</tr>';
        }).join('');

    document.getElementById('main').innerHTML = window.RahSahl.sidebar.renderTopbar(
      'الطلبات', 'إدارة طلباتك وتتبع حالتها.', ctx
    ) + ''
      + '<div class="flex flex-col md:flex-row gap-3 mb-6">'
      + '  <div class="flex gap-2 flex-wrap">'
      + statusChip('all', 'الكل', currentOrders.length)
      + statusChip('pending', 'قيد الانتظار', currentOrders.filter(function (o) { return o.order_status === 'pending'; }).length)
      + statusChip('confirmed', 'مأكّدة', currentOrders.filter(function (o) { return o.order_status === 'confirmed'; }).length)
      + statusChip('shipped', 'تم الشحن', currentOrders.filter(function (o) { return o.order_status === 'shipped'; }).length)
      + '  </div>'
      + '  <div class="md:mr-auto relative">'
      + '    <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-[18px] text-slate-400">search</span>'
      + '    <input id="searchInput" type="search" placeholder="ابحث بالاسم، المنتج، المدينة..." '
      + '           class="pr-10 w-full md:w-72" value="' + esc(searchQuery) + '"/>'
      + '  </div>'
      + '</div>'

      + '<div class="card overflow-hidden">'
      + '  <div class="table-wrap">'
      + '    <table class="data-table">'
      + '      <thead><tr><th>العميل</th><th>المنتج</th><th>المدينة</th><th>الحالة</th><th>التاريخ</th><th>إجراء</th></tr></thead>'
      + '      <tbody>' + rows + '</tbody>'
      + '    </table>'
      + '  </div>'
      + '</div>';

    // Bind status buttons
    Array.prototype.forEach.call(document.querySelectorAll('.js-status'), function (btn) {
      btn.addEventListener('click', async function () {
        var id = btn.getAttribute('data-id');
        var action = btn.getAttribute('data-action');
        btn.disabled = true;
        var res = await window.RahSahl.api.updateOrderStatus(id, action);
        if (res.error) {
          alert('فشل تحديث الحالة: ' + res.error.message);
          btn.disabled = false;
          return;
        }
        // Refresh data
        var reload = await window.RahSahl.api.listOrders({ limit: 200 });
        if (!reload.error) currentOrders = reload.data || [];
        renderPage();
      });
    });

    var search = document.getElementById('searchInput');
    search.addEventListener('input', function (e) {
      searchQuery = e.target.value;
      renderPage();
      // Restore focus + cursor position
      var s = document.getElementById('searchInput');
      s.focus(); s.setSelectionRange(s.value.length, s.value.length);
    });
  }

  function statusChip(key, label, count) {
    var active = currentStatus === key;
    var cls = active ? 'btn-primary' : 'btn-outline';
    return '<button data-status="' + key + '" class="js-filter ' + cls + ' text-[13px] py-2 px-4">' + label + ' <span class="opacity-70 text-[11px]">(' + count + ')</span></button>';
  }

  // Initial load
  document.getElementById('main').innerHTML = window.RahSahl.sidebar.renderTopbar('الطلبات', '...', ctx)
    + '<div class="card p-12"><div class="skeleton h-32"></div></div>';

  var res = await window.RahSahl.api.listOrders({ limit: 200 });
  if (res.error) {
    document.getElementById('main').innerHTML = window.RahSahl.sidebar.renderTopbar('الطلبات', '', ctx)
      + '<div class="empty-state"><span class="material-symbols-outlined text-red-500">error</span><p class="mt-2">فشل تحميل الطلبات: ' + esc(res.error.message) + '</p></div>';
    return;
  }
  currentOrders = res.data || [];
  renderPage();

  // Bind filter chips
  document.body.addEventListener('click', function (e) {
    var f = e.target.closest('.js-filter');
    if (!f) return;
    currentStatus = f.getAttribute('data-status');
    renderPage();
  });
})();
</script>
</body>
</html>
