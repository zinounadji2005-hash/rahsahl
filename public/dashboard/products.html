<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>المنتجات — RahSahl</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{navy:'#0b1420',sky:'#0ea5e9',amber:'#f59e0b',teal:'#14b8a6'},fontFamily:{ar:['IBM Plex Sans Arabic','sans-serif'],en:['Inter','sans-serif']}}}}</script>
<style>
:root{--bg:#f5f0eb;--text:#334155;--heading:#0b1420;--muted:#64748b;--muted-400:#94a3b8;--card:#fff;--card-border:#e2e8f0;--card-hover-border:#cbd5e1;--input-bg:#fff;--input-border:#e2e8f0;--soft-sky:#e0f2fe;--soft-teal:#ccfbf1;--soft-amber:#fef3c7;--soft-slate:#f8fafc;--border-light:#e2e8f0;--hover-bg:rgba(14,165,233,0.04)}
html.dark{--bg:#0b1420;--text:#dbe2f5;--heading:#f1f5f9;--muted:#88929b;--muted-400:#6b7a8a;--card:#18202d;--card-border:#2d3543;--card-hover-border:#3e4850;--input-bg:#141c29;--input-border:#3e4850;--soft-sky:rgba(14,165,233,0.12);--soft-teal:rgba(20,184,166,0.12);--soft-amber:rgba(245,158,11,0.12);--soft-slate:#141c29;--border-light:#2d3543;--hover-bg:rgba(14,165,233,0.08)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);transition:background 0.3s,color 0.3s}
h1,h2,h3,h4{font-family:'IBM Plex Sans Arabic',sans-serif;color:var(--heading)}
.text-muted{color:var(--muted)}.text-heading{color:var(--heading)}
html.dark .text-navy{color:var(--heading)!important}
html.dark .text-slate-600{color:var(--text)!important}
html.dark .text-slate-400{color:var(--muted-400)!important}
html.dark .bg-white{background:var(--card)!important}
html.dark .bg-sky-100{background:var(--soft-sky)!important}
html.dark .bg-teal-100{background:var(--soft-teal)!important}
html.dark .bg-amber-100{background:var(--soft-amber)!important}
</style>
<link href="css/styles.css" rel="stylesheet"/>
</head>
<body>
<nav class="sidenav" id="sidenav"></nav>
<main class="main-content" id="main"></main>

<script src="js/supabase.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/api.js"></script>
<script src="js/sidebar.js"></script>
<script>
(async function () {
  var ctx = await window.RahSahl.authGuard.guard();
  if (!ctx) return;
  window.RahSahl.sidebar.boot();
  document.getElementById('sidenav').innerHTML = window.RahSahl.sidebar.renderSidebar(ctx);

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function toast(msg, type) {
    var el = document.createElement('div');
    el.className = 'fixed top-6 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-2xl shadow-lg text-white text-[14px] font-semibold flex items-center gap-2 ' + (type === 'error' ? 'bg-red-500' : 'bg-teal-500');
    el.innerHTML = '<span class="material-symbols-outlined text-[18px]">' + (type === 'error' ? 'error' : 'check_circle') + '</span>' + esc(msg);
    document.body.appendChild(el);
    setTimeout(function () { el.remove(); }, 2500);
  }

  function fmtDZD(n) {
    if (n == null) return '—';
    return Number(n).toLocaleString('ar-DZ') + ' د.ج';
  }

  function renderForm(product) {
    var p = product || { name: '', sku: '', description: '', price: '', stock: 0, is_active: true };
    var isEdit = !!product;
    return ''
      + '<form id="productForm" class="space-y-4">'
      + '  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">'
      + '    <div><label class="block text-[13px] font-semibold text-navy mb-1.5">اسم المنتج *</label>'
      + '      <input id="pName" type="text" value="' + esc(p.name) + '" required/></div>'
      + '    <div><label class="block text-[13px] font-semibold text-navy mb-1.5">SKU</label>'
      + '      <input id="pSku" type="text" value="' + esc(p.sku || '') + '" placeholder="اختياري"/></div>'
      + '  </div>'
      + '  <div><label class="block text-[13px] font-semibold text-navy mb-1.5">الوصف</label>'
      + '    <textarea id="pDesc" rows="2">' + esc(p.description || '') + '</textarea></div>'
      + '  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">'
      + '    <div><label class="block text-[13px] font-semibold text-navy mb-1.5">السعر (د.ج) *</label>'
      + '      <input id="pPrice" type="number" min="0" step="0.01" dir="ltr" value="' + esc(p.price) + '" required/></div>'
      + '    <div><label class="block text-[13px] font-semibold text-navy mb-1.5">المخزون</label>'
      + '      <input id="pStock" type="number" min="0" dir="ltr" value="' + esc(p.stock) + '"/></div>'
      + '  </div>'
      + '  <div class="flex items-center gap-2">'
      + '    <input id="pActive" type="checkbox" class="w-4 h-4 accent-sky-500" ' + (p.is_active ? 'checked' : '') + '/>'
      + '    <label for="pActive" class="text-[13px] text-navy">منتج نشط (يظهر للعميل)</label>'
      + '  </div>'
      + (isEdit ? '<input type="hidden" id="pId" value="' + esc(p.id) + '"/>' : '')
      + '  <div class="flex gap-2 pt-2">'
      + '    <button type="submit" class="btn-primary">' + (isEdit ? 'حفظ التعديلات' : 'إضافة المنتج') + '</button>'
      + '    <button type="button" id="cancelForm" class="btn-outline">إلغاء</button>'
      + '  </div>'
      + '</form>';
  }

  function renderList(products) {
    if (products.length === 0) {
      return '<div class="empty-state"><span class="material-symbols-outlined">inventory_2</span><p class="mt-2 text-[14px]">لا توجد منتجات. أضف أول منتج!</p></div>';
    }
    return ''
      + '<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">'
      + products.map(function (p) {
          var stockClass = p.stock === 0 ? 'text-red-600' : p.stock < 10 ? 'text-amber-600' : 'text-emerald-600';
          return ''
            + '<div class="card p-5 flex flex-col">'
            + '  <div class="flex justify-between items-start mb-3">'
            + '    <div class="min-w-0 flex-1">'
            + '      <h3 class="font-ar text-[16px] font-bold text-navy truncate">' + esc(p.name) + '</h3>'
            + (p.sku ? '      <p class="text-[11px] text-slate-400" dir="ltr">' + esc(p.sku) + '</p>' : '')
            + '    </div>'
            + '    <span class="pill ' + (p.is_active ? 'pill-success' : 'pill-muted') + ' shrink-0">' + (p.is_active ? 'نشط' : 'مخفي') + '</span>'
            + '  </div>'
            + (p.description ? '<p class="text-[13px] text-slate-500 mb-3 line-clamp-2">' + esc(p.description) + '</p>' : '')
            + '  <div class="flex justify-between items-end mt-auto pt-3 border-t" style="border-color:var(--card-border)">'
            + '    <div>'
            + '      <p class="text-[18px] font-bold text-sky-600">' + fmtDZD(p.price) + '</p>'
            + '      <p class="text-[12px] ' + stockClass + ' font-semibold">المخزون: ' + (p.stock || 0) + '</p>'
            + '    </div>'
            + '    <div class="flex gap-1">'
            + '      <button data-id="' + p.id + '" data-action="edit" class="js-edit p-2 rounded-lg hover:bg-slate-100 text-slate-500 hover:text-sky-600">'
            + '        <span class="material-symbols-outlined text-[18px]">edit</span></button>'
            + '      <button data-id="' + p.id + '" data-action="delete" class="js-delete p-2 rounded-lg hover:bg-red-50 text-slate-500 hover:text-red-600">'
            + '        <span class="material-symbols-outlined text-[18px]">delete</span></button>'
            + '    </div>'
            + '  </div>'
            + '</div>';
        }).join('')
      + '</div>';
  }

  async function load() {
    document.getElementById('main').innerHTML = window.RahSahl.sidebar.renderTopbar('المنتجات', '...', ctx)
      + '<div class="card p-12"><div class="skeleton h-32"></div></div>';

    var res = await window.RahSahl.api.listProducts();
    if (res.error) {
      document.getElementById('main').innerHTML = window.RahSahl.sidebar.renderTopbar('المنتجات', '', ctx)
        + '<div class="empty-state"><span class="material-symbols-outlined text-red-500">error</span><p class="mt-2">فشل تحميل المنتجات: ' + esc(res.error.message) + '</p></div>';
      return;
    }
    var products = res.data || [];
    render(products, null);
  }

  function render(products, editing) {
    var activeCount = products.filter(function (p) { return p.is_active; }).length;
    var totalStock = products.reduce(function (sum, p) { return sum + (p.stock || 0); }, 0);
    document.getElementById('main').innerHTML = window.RahSahl.sidebar.renderTopbar(
      'المنتجات', products.length + ' منتج · ' + activeCount + ' نشط · ' + totalStock + ' وحدة في المخزون', ctx
    ) + ''
      + '<div class="flex gap-2 mb-6">'
      + '  <button id="btnNew" class="btn-primary">'
      + '    <span class="material-symbols-outlined text-[18px]">add</span>'
      + '    منتج جديد'
      + '  </button>'
      + '</div>'
      + '<div id="formSlot"></div>'
      + '<div id="listSlot">' + renderList(products) + '</div>';

    document.getElementById('btnNew').addEventListener('click', function () {
      document.getElementById('formSlot').innerHTML = ''
        + '<div class="card p-6 mb-6 border-2 border-sky-200">'
        + '  <h3 class="font-ar text-[16px] font-bold mb-4 flex items-center gap-2">'
        + '    <span class="material-symbols-outlined text-sky-500">add_circle</span>'
        + '    إضافة منتج جديد'
        + '  </h3>'
        + renderForm(null)
        + '</div>';
      bindForm();
      document.getElementById('pName').focus();
    });

    bindListActions(products);
  }

  function bindForm() {
    document.getElementById('productForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      var btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = 'جاري الحفظ...';
      var id = document.getElementById('pId') ? document.getElementById('pId').value : null;
      var payload = {
        name: document.getElementById('pName').value.trim(),
        sku: document.getElementById('pSku').value.trim() || null,
        description: document.getElementById('pDesc').value.trim() || null,
        price: Number(document.getElementById('pPrice').value),
        stock: Number(document.getElementById('pStock').value || 0),
        is_active: document.getElementById('pActive').checked,
        currency: 'DZD'
      };
      var res = id
        ? await window.RahSahl.api.updateProduct(id, payload)
        : await window.RahSahl.api.createProduct(payload);
      btn.disabled = false; btn.textContent = id ? 'حفظ التعديلات' : 'إضافة المنتج';
      if (res.error) { toast('فشل: ' + res.error.message, 'error'); return; }
      toast(id ? 'تم تحديث المنتج' : 'تم إضافة المنتج', 'success');
      load();
    });
    var cancel = document.getElementById('cancelForm');
    if (cancel) cancel.addEventListener('click', load);
  }

  function bindListActions(products) {
    Array.prototype.forEach.call(document.querySelectorAll('.js-edit'), function (btn) {
      btn.addEventListener('click', function () {
        var id = btn.getAttribute('data-id');
        var product = products.find(function (p) { return p.id === id; });
        if (!product) return;
        document.getElementById('formSlot').innerHTML = ''
          + '<div class="card p-6 mb-6 border-2 border-sky-200">'
          + '  <h3 class="font-ar text-[16px] font-bold mb-4 flex items-center gap-2">'
          + '    <span class="material-symbols-outlined text-sky-500">edit</span>'
          + '    تعديل: ' + esc(product.name)
          + '  </h3>'
          + renderForm(product)
          + '</div>';
        bindForm();
        document.getElementById('pName').focus();
      });
    });
    Array.prototype.forEach.call(document.querySelectorAll('.js-delete'), function (btn) {
      btn.addEventListener('click', async function () {
        var id = btn.getAttribute('data-id');
        if (!confirm('هل أنت متأكد من حذف هذا المنتج؟')) return;
        btn.disabled = true;
        var res = await window.RahSahl.api.deleteProduct(id);
        if (res.error) { toast('فشل: ' + res.error.message, 'error'); btn.disabled = false; return; }
        toast('تم حذف المنتج', 'success');
        load();
      });
    });
  }

  load();
})();
</script>
</body>
</html>
