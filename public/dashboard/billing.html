  <script>
  (async function () {
    var L = window.RahSahl && window.RahSahl.lang;
    function __(k) { return L ? L.t(k) : k; }

    var ctx = await window.RahSahl.authGuard.guard();
    if (!ctx) return;

    var api = window.RahSahl.api;
    var sid = window.RahSahl.sidebar;
    sid.boot();
    window.RahSahl.sidebarCtx = ctx;

    var balanceData = null;
    var packsData = null;

    function render() {
      document.getElementById('sidebar').innerHTML = sid.renderSidebar(ctx);
      var top = document.getElementById('topbar');
      top.setAttribute('data-title', 'bill.title');
      top.setAttribute('data-subtitle', 'bill.subtitle');
      top.innerHTML = sid.renderTopbar(__(titles.title), __(titles.subtitle), ctx);
      renderBalance();
      renderPacks();
      setText('lblRecharge', 'bill.recharge');
      setText('lblRechargeDesc', 'bill.pack-desc');
      setText('lblCustom', 'bill.custom');
      setText('lblCustomDesc', 'bill.custom-desc');
      setText('lblPrice', 'bill.price');
      setText('lblTxHistory', 'bill.history');
      setText('tabTx', 'bill.tx');
      setText('tabPayments', 'bill.payments');
      setText('btnCustomPurchase', 'bill.buy-custom');
    }

    function setText(id, key) {
      var el = document.getElementById(id);
      if (el) el.textContent = __(key);
    }

    var titles = { title: 'bill.title', subtitle: 'bill.subtitle' };

    function renderBalance() {
      var bd = document.getElementById('balanceData');
      if (!bd) return;
      if (!balanceData) { bd.innerHTML = ''; return; }
      var bal = balanceData;
      bd.innerHTML = '<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">'
        + '<div class="card p-5 flex items-center gap-4"><div class="w-12 h-12 rounded-xl bg-soft-sky flex items-center justify-center shrink-0"><span class="material-symbols-outlined text-sky-600" style="font-variation-settings:\'FILL\' 1">account_balance_wallet</span></div><div><p class="text-muted text-[13px]">' + __('bill.balance') + '</p><p class="text-[26px] font-bold text-heading"><span id="currentBalance">0</span> <span class="text-[14px] font-normal text-muted">' + __('bill.coin') + '</span></p></div></div>'
        + '<div class="card p-5 flex items-center gap-4"><div class="w-12 h-12 rounded-xl bg-soft-teal flex items-center justify-center shrink-0"><span class="material-symbols-outlined text-teal-600" style="font-variation-settings:\'FILL\' 1">add_shopping_cart</span></div><div><p class="text-muted text-[13px]">' + __('bill.purchased') + '</p><p class="text-[26px] font-bold text-heading"><span id="totalPurchased">0</span></p></div></div>'
        + '<div class="card p-5 flex items-center gap-4"><div class="w-12 h-12 rounded-xl bg-soft-amber flex items-center justify-center shrink-0"><span class="material-symbols-outlined text-amber-600" style="font-variation-settings:\'FILL\' 1">trending_down</span></div><div><p class="text-muted text-[13px]">' + __('bill.spent') + '</p><p class="text-[26px] font-bold text-heading"><span id="totalSpent">0</span></p></div></div>'
        + '<div class="card p-5 flex items-center gap-4"><div class="w-12 h-12 rounded-xl bg-purple-50 flex items-center justify-center shrink-0"><span class="material-symbols-outlined text-purple-600" style="font-variation-settings:\'FILL\' 1">card_giftcard</span></div><div><p class="text-muted text-[13px]">' + __('bill.bonus') + '</p><p class="text-[26px] font-bold text-heading"><span id="totalBonus">0</span></p></div></div>'
        + '</div>';
      animateCounter(document.getElementById('currentBalance'), bal.balance ?? 0);
      animateCounter(document.getElementById('totalPurchased'), bal.total_purchased ?? 0);
      animateCounter(document.getElementById('totalSpent'), bal.total_spent ?? 0);
      animateCounter(document.getElementById('totalBonus'), bal.total_bonus ?? 0);
    }

    function renderPacks() {
      var pg = document.getElementById('packsGrid');
      if (!pg) return;
      if (packsData && packsData.length) {
        pg.innerHTML = packsData.filter(function (p) { return p.tier !== 'custom'; }).map(function (p) {
          var isRec = p.tier === 'growth' || p.tier === 'business';
          return '<div class="card p-5 pack-card ' + (isRec ? 'recommended' : '') + '" onclick="purchasePack(\'' + p.tier + '\')">'
            + '<div class="flex items-center justify-between mb-3">'
            + '<span class="font-ar font-bold text-[18px] text-heading">' + (p.display_name_ar || p.tier) + '</span>'
            + (isRec ? '<span class="badge text-white text-[11px]" style="background:linear-gradient(135deg,#0ea5e9,#14b8a6)">' + __('bill.most-popular') + '</span>' : '')
            + '</div>'
            + '<p class="text-[32px] font-bold text-heading">' + (p.coins ?? 0).toLocaleString('ar-DZ') + ' <span class="text-[14px] font-normal text-muted">' + __('bill.coin') + '</span></p>'
            + '<p class="text-[18px] font-bold mt-2 gradient-text">' + (p.price_dzd ?? 0).toLocaleString('ar-DZ') + ' <span class="text-[13px] font-normal text-muted">Ø¯.Ø¬</span></p>'
            + '<button class="mt-4 w-full btn-primary py-2.5 rounded-xl font-semibold text-[14px]">' + __('bill.buy-now') + '</button>'
            + '</div>';
        }).join('');
      } else {
        pg.innerHTML = '<div class="col-span-full py-12 text-center"><span class="material-symbols-outlined text-[40px] text-muted">inventory_2</span><p class="text-muted mt-2">' + __('bill.loading') + '</p></div>';
      }
    }

    function animateCounter(el, target) {
      if (!el) return;
      var t = parseInt(target) || 0;
      if (t === 0) { el.textContent = '0'; return; }
      var c = 0, step = Math.max(1, Math.floor(t / 40));
      var iv = setInterval(function () {
        c += step;
        if (c >= t) { c = t; clearInterval(iv); }
        el.textContent = c.toLocaleString('ar-DZ');
      }, 25);
    }

    render();

    var balRes = await api.getCoinBalance();
    if (balRes.data) { balanceData = balRes.data; renderBalance(); }

    var packsRes = await api.listCoinPacks();
    if (packsRes.data) { packsData = packsRes.data; renderPacks(); }

    // Custom pack slider
    var range = document.getElementById('customRange');
    var coinsDisplay = document.getElementById('customCoinsDisplay');
    var priceDisplay = document.getElementById('customPriceDisplay');
    var perCoinDisplay = document.getElementById('customPerCoin');

    async function updateCustomPrice(val) {
      coinsDisplay.textContent = parseInt(val).toLocaleString('ar-DZ');
      var res = await api.getCustomPrice(parseInt(val));
      if (res.data) {
        priceDisplay.innerHTML = (res.data.price_dzd ?? 0).toLocaleString('ar-DZ') + ' <span class="text-[14px] font-normal text-muted">Ø¯.Ø¬</span>';
        perCoinDisplay.textContent = res.data.per_coin ?? 'â€”';
      }
    }
    range.addEventListener('input', function () { updateCustomPrice(range.value); });
    updateCustomPrice(range.value);

    document.getElementById('btnCustomPurchase').addEventListener('click', async function () {
      await purchasePack('custom', parseInt(range.value));
    });

    // Tabs
    var txTable = document.getElementById('txTable');

    async function loadTx() {
      txTable.innerHTML = '<div class="skeleton h-32"></div>';
      var txRes = await api.listTransactions(50);
      var tx = txRes.data;
      if (!tx || !tx.length) {
        txTable.innerHTML = '<div class="text-center py-12"><span class="material-symbols-outlined text-[40px] text-muted">receipt_long</span><p class="text-muted mt-2">' + __('bill.no-tx') + '</p></div>';
        return;
      }
      txTable.innerHTML = '<table><thead><tr><th>' + __('th.date') + '</th><th>' + __('th.type') + '</th><th>' + __('th.reason') + '</th><th style="text-align:left">' + __('th.amount') + '</th><th style="text-align:left">' + __('th.balance') + '</th></tr></thead><tbody>'
        + tx.map(function (tr) {
          var isDeduct = tr.type === 'deduction';
          var typeKey = 'tx.' + tr.type;
          var typeLabel = __(typeKey) || tr.type;
          return '<tr class="tx-row"><td class="text-muted text-[13px]">' + new Date(tr.created_at).toLocaleDateString('ar-DZ') + '</td>'
            + '<td><span class="badge text-[11px] ' + (isDeduct ? 'bg-red-50 text-red-500' : 'bg-green-50 text-teal-600') + '">' + typeLabel + '</span></td>'
            + '<td class="text-muted">' + (tr.reason || '<span class="text-muted-400">â€”</span>') + '</td>'
            + '<td style="text-align:left" class="font-bold ' + (isDeduct ? 'text-red-500' : 'text-teal-600') + '">' + (isDeduct ? '' : '+') + (tr.amount ?? 0).toLocaleString('ar-DZ') + '</td>'
            + '<td style="text-align:left" class="font-bold text-heading">' + (tr.balance_after != null ? Number(tr.balance_after).toLocaleString('ar-DZ') : 'â€”') + '</td></tr>';
        }).join('') + '</tbody></table>';
    }

    async function loadPayments() {
      txTable.innerHTML = '<div class="skeleton h-32"></div>';
      var pmtsRes = await api.listPayments(50);
      var pmts = pmtsRes.data;
      if (!pmts || !pmts.length) {
        txTable.innerHTML = '<div class="text-center py-12"><span class="material-symbols-outlined text-[40px] text-muted">credit_card</span><p class="text-muted mt-2">' + __('bill.no-payments') + '</p></div>';
        return;
      }
      var statusKeys = { pending: 'pay.pending', paid: 'pay.paid', failed: 'pay.failed', canceled: 'pay.canceled', expired: 'pay.expired' };
      var statusColor = { pending: 'bg-amber-50 text-amber-600', paid: 'bg-green-50 text-teal-600', failed: 'bg-red-50 text-red-500', canceled: 'bg-soft-slate text-muted', expired: 'bg-soft-slate text-muted' };
      txTable.innerHTML = '<table><thead><tr><th>' + __('th.date') + '</th><th>' + __('th.pack') + '</th><th style="text-align:left">' + __('th.coins') + '</th><th style="text-align:left">' + __('th.amount') + '</th><th>' + __('th.status') + '</th></tr></thead><tbody>'
        + pmts.map(function (p) {
          return '<tr class="tx-row"><td class="text-muted text-[13px]">' + new Date(p.created_at).toLocaleDateString('ar-DZ') + '</td>'
            + '<td class="font-semibold text-heading">' + (p.pack_tier || 'â€”') + '</td>'
            + '<td style="text-align:left">' + (p.coins_granted ?? 0).toLocaleString('ar-DZ') + '</td>'
            + '<td style="text-align:left" class="font-bold text-heading">' + (p.amount_dzd ?? 0).toLocaleString('ar-DZ') + ' Ø¯.Ø¬</td>'
            + '<td><span class="badge text-[11px] ' + (statusColor[p.status] || '') + '">' + __(statusKeys[p.status] || '') + '</span></td></tr>';
        }).join('') + '</tbody></table>';
    }

    document.getElementById('tabTx').addEventListener('click', function () {
      document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
      this.classList.add('active');
      loadTx();
    });
    document.getElementById('tabPayments').addEventListener('click', function () {
      document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
      this.classList.add('active');
      loadPayments();
    });
    loadTx();

    window.purchasePack = async function (tier, customCoins) {
      var btn = document.querySelector('[onclick*="' + tier + '"] button') || document.getElementById('btnCustomPurchase');
      if (btn) { btn.disabled = true; btn.textContent = __('general.saving'); }
      try {
        var res = await api.createCheckout(tier, customCoins);
        if (res.error) { alert(__('general.error') + ': ' + res.error.message); return; }
        if (res.data && res.data.checkout_url) window.location.href = res.data.checkout_url;
        else alert(__('general.error'));
      } catch (e) { alert(__('general.error') + ': ' + e.message); }
      finally { if (btn) { btn.disabled = false; btn.textContent = __('bill.buy-now'); } }
    };

    // Re-render on language switch
    window.addEventListener('langchange', function () {
      render();
    });
  })();
  </script>

</body>
</html>
