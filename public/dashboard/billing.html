<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>الفوترة — RahSahl</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <script>
    tailwind.config={darkMode:'class',theme:{extend:{colors:{navy:'#0b1420',sky:'#0ea5e9',amber:'#f59e0b',teal:'#14b8a6'},fontFamily:{ar:['IBM Plex Sans Arabic','sans-serif'],en:['Inter','sans-serif']},animation:{blob:'blob 7s infinite','fade-up':'fadeUp 0.6s ease-out forwards'},keyframes:{blob:{'0%,100%':{transform:'translate(0,0) scale(1)'},'33%':{transform:'translate(30px,-50px) scale(1.1)'},'66%':{transform:'translate(-20px,20px) scale(0.9)'}},fadeUp:{'0%':{opacity:'0',transform:'translateY(30px)'},'100%':{opacity:'1',transform:'translateY(0)'}}}}}}}
  </script>
  <style>
    *{scroll-behavior:smooth}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:var(--muted)}
    :root{--bg:#f5f0eb;--text:#334155;--heading:#0b1420;--muted:#64748b;--muted-400:#94a3b8;--card:#fff;--card-border:#e2e8f0;--card-hover-border:#cbd5e1;--section-alt:#fff;--nav-bg:rgba(255,255,255,0.85);--nav-border:#e2e8f0;--input-bg:#fff;--input-border:#e2e8f0;--soft-sky:#e0f2fe;--soft-teal:#ccfbf1;--soft-amber:#fef3c7;--chart-grid:#e2e8f0;--social-bg:rgba(0,0,0,0.05);--soft-slate:#f8fafc;--border-light:#e2e8f0;--hover-bg:rgba(14,165,233,0.04)}
    html.dark{--bg:#0b1420;--text:#dbe2f5;--heading:#f1f5f9;--muted:#88929b;--muted-400:#6b7a8a;--card:#18202d;--card-border:#2d3543;--card-hover-border:#3e4850;--section-alt:#0b1420;--nav-bg:rgba(11,20,32,0.85);--nav-border:#2d3543;--input-bg:#141c29;--input-border:#3e4850;--soft-sky:rgba(14,165,233,0.12);--soft-teal:rgba(20,184,166,0.12);--soft-amber:rgba(245,158,11,0.12);--chart-grid:#2d3543;--social-bg:rgba(255,255,255,0.08);--soft-slate:#141c29;--border-light:#2d3543;--hover-bg:rgba(14,165,233,0.08)}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);transition:background 0.3s,color 0.3s}
    h1,h2,h3,h4{font-family:'IBM Plex Sans Arabic',sans-serif;color:var(--heading)}
    .card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;transition:all 0.3s ease}
    .card:hover{box-shadow:0 12px 40px rgba(0,0,0,0.06);border-color:var(--card-hover-border);transform:translateY(-2px)}
    .btn-primary{background:linear-gradient(135deg,#0ea5e9,#14b8a6);color:#fff;transition:all 0.3s;position:relative;overflow:hidden}
    .btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#14b8a6,#0ea5e9);opacity:0;transition:opacity 0.3s}
    .btn-primary:hover::after{opacity:1}
    .btn-primary:hover{box-shadow:0 8px 25px rgba(14,165,233,0.35);transform:translateY(-2px)}
    .btn-primary:active{transform:translateY(0)}
    .btn-primary > *{position:relative;z-index:1}
    .btn-outline{border:1px solid var(--card-border);color:var(--text);transition:all 0.2s;border-radius:12px}
    .btn-outline:hover{border-color:#0ea5e9;color:#0ea5e9;background:var(--hover-bg);transform:translateY(-1px)}
    .gradient-text{background:linear-gradient(135deg,#0ea5e9,#14b8a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.3;animation:blob 7s infinite;pointer-events:none;z-index:0}
    .grid-dots{position:fixed;inset:0;opacity:0.015;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%230ea5e9' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
    .text-muted{color:var(--muted)}.text-heading{color:var(--heading)}.bg-section{background:var(--section-alt)}.border-light{border-color:var(--border-light)}
    html.dark .text-navy{color:var(--heading)!important}
    html.dark .text-slate-600{color:var(--text)!important}
    html.dark .text-slate-400{color:var(--muted-400)!important}
    html.dark .bg-white{background:var(--card)!important}
    html.dark .bg-sky-100{background:var(--soft-sky)!important}
    html.dark .bg-teal-100{background:var(--soft-teal)!important}
    html.dark .bg-green-50{background:rgba(20,184,166,0.12)!important}
    html.dark .bg-red-50{background:rgba(239,68,68,0.12)!important}
    html.dark .text-green-600{color:#2dd4bf!important}
    html.dark .text-red-500{color:#f87171!important}
    html.dark .text-sky-700{color:#38bdf8!important}
    html.dark .text-sky-600{color:#38bdf8!important}
    html.dark .bg-sky-50{background:var(--soft-sky)!important}
    html.dark input,html.dark select{background:var(--input-bg);border-color:var(--input-border);color:var(--text)}
    html.dark .gradient-text{background:linear-gradient(135deg,#38bdf8,#2dd4bf);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    html.dark .blob{opacity:0.1!important}
    .custom-range{-webkit-appearance:none;appearance:none;height:6px;border-radius:3px;background:linear-gradient(to right,#0ea5e9,#14b8a6);outline:none;width:100%}
    .custom-range::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#0ea5e9,#14b8a6);cursor:pointer;border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.18)}
    .custom-range::-webkit-slider-thumb:hover{transform:scale(1.15)}
    html.dark .custom-range::-webkit-slider-thumb{background:linear-gradient(135deg,#38bdf8,#2dd4bf);border-color:var(--card)}
    .tab-btn{cursor:pointer;transition:all 0.25s;border-radius:10px;font-size:13px;padding:6px 16px;font-weight:600}
    .tab-btn.active{background:linear-gradient(135deg,#0ea5e9,#14b8a6);color:#fff;box-shadow:0 4px 12px rgba(14,165,233,0.25)}
    .tab-btn:not(.active){background:var(--soft-slate);color:var(--muted)}
    .tab-btn:not(.active):hover{color:var(--heading);background:var(--hover-bg)}
    table{width:100%;border-collapse:collapse}
    th{text-align:right;font-size:12px;font-weight:600;color:var(--muted);padding-bottom:12px;border-bottom:1px solid var(--border-light)}
    td{padding:12px 0;font-size:14px;border-bottom:1px solid var(--border-light);vertical-align:middle}
    .badge{font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;display:inline-block}
    .skeleton{background:linear-gradient(90deg,var(--soft-slate) 25%,var(--card-border) 50%,var(--soft-slate) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:12px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .pack-card{cursor:pointer;transition:all 0.3s ease;position:relative;overflow:hidden}
    .pack-card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,0.08);border-color:#0ea5e9}
    .pack-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#0ea5e9,#14b8a6);opacity:0;transition:opacity 0.3s}
    .pack-card:hover::before{opacity:1}
    .tx-row{transition:background 0.2s}
    .tx-row:hover{background:var(--hover-bg)}
  </style>
</head>
<body class="antialiased min-h-screen selection:bg-sky-200/50">

  <div class="grid-dots"></div>
  <div class="blob w-[500px] h-[500px] bg-sky-300 top-[-15%] left-[-10%]"></div>
  <div class="blob w-[400px] h-[400px] bg-teal-300 bottom-[-10%] right-[-5%]" style="animation-delay:2s"></div>

  <div class="flex min-h-screen relative z-10">
    <aside id="sidebar" class="w-64 shrink-0 min-h-screen sticky top-0 flex flex-col border-l" style="background:var(--card);border-color:var(--card-border)"></aside>
    <main class="flex-1 p-6 md:p-8 overflow-y-auto">
      <div id="topbar"></div>

      <!-- Balance Card -->
      <div class="card p-6 mb-6">
        <div class="flex items-center justify-between flex-wrap gap-4">
          <div class="flex items-center gap-4">
            <div class="w-14 h-14 rounded-2xl flex items-center justify-center shadow-lg shadow-sky-200/20" style="background:linear-gradient(135deg,#0ea5e9,#14b8a6)">
              <span class="material-symbols-outlined text-white text-[28px]" style="font-variation-settings:'FILL' 1">monetization_on</span>
            </div>
            <div>
              <p class="text-[13px] text-muted">الرصيد الحالي</p>
              <p class="font-ar text-[32px] font-bold text-heading"><span id="currentBalance">—</span> <span class="text-[16px] font-normal text-muted">نقطة</span></p>
            </div>
          </div>
          <div class="flex gap-6 text-center">
            <div><p class="text-[11px] text-muted">تم شراؤها</p><p class="font-bold text-[18px] text-heading" id="totalPurchased">—</p></div>
            <div class="w-px self-stretch" style="background:var(--card-border)"></div>
            <div><p class="text-[11px] text-muted">مستعملة</p><p class="font-bold text-[18px] text-heading" id="totalSpent">—</p></div>
            <div class="w-px self-stretch" style="background:var(--card-border)"></div>
            <div><p class="text-[11px] text-muted">بونص</p><p class="font-bold text-[18px] gradient-text" id="totalBonus">—</p></div>
          </div>
        </div>
      </div>

      <!-- Coin Packs -->
      <div class="card p-6 mb-6">
        <div class="flex items-center gap-3 mb-5">
          <div class="bg-sky-50 p-2.5 rounded-xl">
            <span class="material-symbols-outlined text-sky-600" style="font-variation-settings:'FILL' 1">local_offer</span>
          </div>
          <div>
            <h2 class="font-ar text-[20px] font-bold text-heading">اشحن رصيدك</h2>
            <p class="text-[14px] text-muted">اختر الباقة المناسبة لاحتياجك.</p>
          </div>
        </div>
        <div id="packsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
      </div>

      <!-- Custom Pack -->
      <div class="card p-6 mb-6">
        <div class="flex items-center gap-3 mb-5">
          <div class="bg-teal-50 p-2.5 rounded-xl">
            <span class="material-symbols-outlined text-teal-600" style="font-variation-settings:'FILL' 1">tune</span>
          </div>
          <div>
            <h2 class="font-ar text-[20px] font-bold text-heading">باقة مخصصة</h2>
            <p class="text-[14px] text-muted">اختر عدد النقاط (1,000 — 1,000,000)</p>
          </div>
        </div>
        <div class="flex flex-col sm:flex-row items-start sm:items-center gap-5">
          <div class="flex-1 w-full">
            <input type="range" id="customRange" class="custom-range" min="1000" max="1000000" value="5000" step="100">
            <div class="flex justify-between text-[12px] mt-1.5 text-muted">
              <span>1,000</span>
              <span id="customCoinsDisplay" class="font-bold gradient-text">5,000</span>
              <span>1,000,000</span>
            </div>
          </div>
          <div class="text-center sm:text-left shrink-0">
            <p class="text-[13px] text-muted">السعر</p>
            <p class="font-bold text-[22px] text-heading"><span id="customPriceDisplay">—</span> <span class="text-[14px] font-normal text-muted">د.ج</span></p>
            <p class="text-[12px] text-muted"><span id="customPerCoin">—</span> د.ج/نقطة</p>
          </div>
          <button id="btnCustomPurchase" class="btn-primary px-6 py-2.5 rounded-xl font-semibold text-[14px] disabled:opacity-50">شراء مخصص</button>
        </div>
      </div>

      <!-- Transaction History -->
      <div class="card p-6">
        <div class="flex items-center justify-between mb-5">
          <div class="flex items-center gap-3">
            <div class="bg-amber-50 p-2.5 rounded-xl">
              <span class="material-symbols-outlined text-amber-600" style="font-variation-settings:'FILL' 1">receipt_long</span>
            </div>
            <h2 class="font-ar text-[20px] font-bold text-heading">سجل المعاملات</h2>
          </div>
          <div class="flex gap-1.5">
            <button id="tabTx" class="tab-btn active">الحركات</button>
            <button id="tabPayments" class="tab-btn">المدفوعات</button>
          </div>
        </div>
        <div id="txTable"><div class="skeleton h-32"></div></div>
      </div>
    </main>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/api.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
  (async function () {
    var ctx = await window.RahSahl.authGuard.guard();
    if (!ctx) return;

    var api = window.RahSahl.api;
    var sid = window.RahSahl.sidebar;
    sid.boot();

    document.getElementById('sidebar').innerHTML = sid.renderSidebar(ctx);
    document.getElementById('topbar').innerHTML = sid.renderTopbar('الفوترة', 'إدارة الرصيد والمشتريات', ctx);

    // Counter animation
    function animateCounter(el, target) {
      if (!el) return;
      var t = parseInt(target) || 0;
      if (t === 0) { el.textContent = '0'; return; }
      var current = 0;
      var step = Math.max(1, Math.floor(t / 40));
      var interval = setInterval(function () {
        current += step;
        if (current >= t) { current = t; clearInterval(interval); }
        el.textContent = current.toLocaleString('ar-DZ');
      }, 25);
    }

    // Load balance
    async function loadBalance() {
      var balRes = await api.getCoinBalance();
      var bal = balRes.data;
      if (bal) {
        animateCounter(document.getElementById('currentBalance'), bal.balance ?? 0);
        animateCounter(document.getElementById('totalPurchased'), bal.total_purchased ?? 0);
        animateCounter(document.getElementById('totalSpent'), bal.total_spent ?? 0);
        animateCounter(document.getElementById('totalBonus'), bal.total_bonus ?? 0);
      }
    }
    await loadBalance();

    // Load packs
    var packsRes = await api.listCoinPacks();
    var packs = packsRes.data;
    var packsGrid = document.getElementById('packsGrid');
    if (packs && packs.length) {
      packsGrid.innerHTML = packs.filter(function (p) { return p.tier !== 'custom'; }).map(function (p) {
        var isRec = p.tier === 'growth' || p.tier === 'business';
        return '<div class="card p-5 pack-card ' + (isRec ? 'recommended' : '') + '" onclick="purchasePack(\'' + p.tier + '\')">'
          + '<div class="flex items-center justify-between mb-3">'
          + '<span class="font-ar font-bold text-[18px] text-heading">' + (p.display_name_ar || p.tier) + '</span>'
          + (isRec ? '<span class="badge text-white text-[11px]" style="background:linear-gradient(135deg,#0ea5e9,#14b8a6)">الأكثر طلباً</span>' : '')
          + '</div>'
          + '<p class="text-[32px] font-bold text-heading">' + (p.coins ?? 0).toLocaleString('ar-DZ') + ' <span class="text-[14px] font-normal text-muted">نقطة</span></p>'
          + '<p class="text-[18px] font-bold mt-2 gradient-text">' + (p.price_dzd ?? 0).toLocaleString('ar-DZ') + ' <span class="text-[13px] font-normal text-muted">د.ج</span></p>'
          + '<button class="mt-4 w-full btn-primary py-2.5 rounded-xl font-semibold text-[14px]">اشتر الآن</button>'
          + '</div>';
      }).join('');
    } else {
      packsGrid.innerHTML = '<div class="col-span-full py-12 text-center"><span class="material-symbols-outlined text-[40px] text-muted">inventory_2</span><p class="text-muted mt-2">جاري تحميل الباقات...</p></div>';
    }

    // Custom pack slider
    var range = document.getElementById('customRange');
    var coinsDisplay = document.getElementById('customCoinsDisplay');
    var priceDisplay = document.getElementById('customPriceDisplay');
    var perCoinDisplay = document.getElementById('customPerCoin');

    async function updateCustomPrice(val) {
      coinsDisplay.textContent = parseInt(val).toLocaleString('ar-DZ');
      var res = await api.getCustomPrice(parseInt(val));
      if (res.data) {
        priceDisplay.innerHTML = (res.data.price_dzd ?? 0).toLocaleString('ar-DZ') + ' <span class="text-[14px] font-normal text-muted">د.ج</span>';
        perCoinDisplay.textContent = res.data.per_coin ?? '—';
      }
    }
    range.addEventListener('input', function () { updateCustomPrice(range.value); });
    updateCustomPrice(range.value);

    document.getElementById('btnCustomPurchase').addEventListener('click', async function () {
      await purchasePack('custom', parseInt(range.value));
    });

    // Tab switching
    var txTable = document.getElementById('txTable');

    async function loadTx() {
      txTable.innerHTML = '<div class="skeleton h-32"></div>';
      var txRes = await api.listTransactions(50);
      var tx = txRes.data;
      if (!tx || !tx.length) {
        txTable.innerHTML = '<div class="text-center py-12"><span class="material-symbols-outlined text-[40px] text-muted">receipt_long</span><p class="text-muted mt-2">لا توجد حركات بعد</p></div>';
        return;
      }
      var typeLabels = { deduction: 'خصم', purchase: 'شراء', bonus: 'بونص', refund: 'استرجاع', bonus_expired: 'انتهاء', admin_adjust: 'تعديل' };
      txTable.innerHTML = '<table><thead><tr><th>التاريخ</th><th>النوع</th><th>السبب</th><th style="text-align:left">المبلغ</th><th style="text-align:left">الرصيد</th></tr></thead><tbody>'
        + tx.map(function (t) {
          var isDeduct = t.type === 'deduction';
          var typeLabel = typeLabels[t.type] || t.type;
          var sign = isDeduct ? '' : '+';
          var color = isDeduct ? 'text-red-500' : 'text-teal-600';
          return '<tr class="tx-row"><td class="text-muted text-[13px]">' + new Date(t.created_at).toLocaleDateString('ar-DZ') + '</td>'
            + '<td><span class="badge text-[11px] ' + (isDeduct ? 'bg-red-50 text-red-500' : 'bg-green-50 text-teal-600') + '">' + typeLabel + '</span></td>'
            + '<td class="text-muted">' + (t.reason || '<span class="text-muted-400">—</span>') + '</td>'
            + '<td style="text-align:left" class="font-bold ' + color + '">' + sign + (t.amount ?? 0).toLocaleString('ar-DZ') + '</td>'
            + '<td style="text-align:left" class="font-bold text-heading">' + (t.balance_after != null ? Number(t.balance_after).toLocaleString('ar-DZ') : '—') + '</td></tr>';
        }).join('') + '</tbody></table>';
    }

    async function loadPayments() {
      txTable.innerHTML = '<div class="skeleton h-32"></div>';
      var pmtsRes = await api.listPayments(50);
      var pmts = pmtsRes.data;
      if (!pmts || !pmts.length) {
        txTable.innerHTML = '<div class="text-center py-12"><span class="material-symbols-outlined text-[40px] text-muted">credit_card</span><p class="text-muted mt-2">لا توجد مدفوعات بعد</p></div>';
        return;
      }
      var statusMap = { pending: 'قيد الانتظار', paid: 'مدفوع', failed: 'فشل', canceled: 'ملغي', expired: 'منتهي' };
      var statusColor = { pending: 'bg-amber-50 text-amber-600', paid: 'bg-green-50 text-teal-600', failed: 'bg-red-50 text-red-500', canceled: 'bg-soft-slate text-muted', expired: 'bg-soft-slate text-muted' };
      txTable.innerHTML = '<table><thead><tr><th>التاريخ</th><th>الباقة</th><th style="text-align:left">النقاط</th><th style="text-align:left">المبلغ</th><th>الحالة</th></tr></thead><tbody>'
        + pmts.map(function (p) {
          return '<tr class="tx-row"><td class="text-muted text-[13px]">' + new Date(p.created_at).toLocaleDateString('ar-DZ') + '</td>'
            + '<td class="font-semibold text-heading">' + (p.pack_tier || '—') + '</td>'
            + '<td style="text-align:left">' + (p.coins_granted ?? 0).toLocaleString('ar-DZ') + '</td>'
            + '<td style="text-align:left" class="font-bold text-heading">' + (p.amount_dzd ?? 0).toLocaleString('ar-DZ') + ' د.ج</td>'
            + '<td><span class="badge text-[11px] ' + (statusColor[p.status] || '') + '">' + (statusMap[p.status] || p.status) + '</span></td></tr>';
        }).join('') + '</tbody></table>';
    }

    document.getElementById('tabTx').addEventListener('click', function () {
      document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
      document.getElementById('tabTx').classList.add('active');
      loadTx();
    });
    document.getElementById('tabPayments').addEventListener('click', function () {
      document.querySelectorAll('.tab-btn').forEach(function (b) { b.classList.remove('active'); });
      document.getElementById('tabPayments').classList.add('active');
      loadPayments();
    });
    loadTx();

    // Purchase
    window.purchasePack = async function (tier, customCoins) {
      var btn = document.querySelector('[onclick*="' + tier + '"] button') || document.getElementById('btnCustomPurchase');
      if (btn) { btn.disabled = true; btn.textContent = 'جاري...'; }
      try {
        var res = await api.createCheckout(tier, customCoins);
        if (res.error) { alert('فشل إنشاء الدفع: ' + res.error.message); return; }
        if (res.data && res.data.checkout_url) window.location.href = res.data.checkout_url;
        else alert('لم يتم استلام رابط الدفع');
      } catch (e) { alert('خطأ: ' + e.message); }
      finally { if (btn) { btn.disabled = false; btn.textContent = 'اشتر الآن'; } }
    };
  })();
  </script>

</body>
</html>
