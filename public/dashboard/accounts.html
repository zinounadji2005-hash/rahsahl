<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f5f0eb">
  <title>الحسابات — RahSahl</title>
  <link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <link href="css/styles.css" rel="stylesheet"/>
  <script>
    tailwind.config={darkMode:'class',theme:{extend:{colors:{navy:'#0b1420',sky:'#0ea5e9',amber:'#f59e0b',teal:'#14b8a6'},fontFamily:{ar:['IBM Plex Sans Arabic','sans-serif'],en:['Inter','sans-serif']},animation:{blob:'blob 7s infinite','fade-up':'fadeUp 0.6s ease-out forwards'},keyframes:{blob:{'0%,100%':{transform:'translate(0,0) scale(1)'},'33%':{transform:'translate(30px,-50px) scale(1.1)'},'66%':{transform:'translate(-20px,20px) scale(0.9)'}},fadeUp:{'0%':{opacity:'0',transform:'translateY(30px)'},'100%':{opacity:'1',transform:'translateY(0)'}}}}}}}
  </script>
  <style>
    *{scroll-behavior:smooth}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--card-border);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:var(--muted)}
    :root{--bg:#f5f0eb;--text:#334155;--heading:#0b1420;--muted:#64748b;--muted-400:#94a3b8;--card:#fff;--card-border:#e2e8f0;--card-hover-border:#cbd5e1;--section-alt:#fff;--nav-bg:rgba(255,255,255,0.85);--nav-border:#e2e8f0;--input-bg:#fff;--input-border:#e2e8f0;--soft-sky:#e0f2fe;--soft-teal:#ccfbf1;--soft-amber:#fef3c7;--chart-grid:#e2e8f0;--social-bg:rgba(0,0,0,0.05);--soft-slate:#f8fafc;--border-light:#e2e8f0;--hover-bg:rgba(14,165,233,0.04)}
    html.dark{--bg:#0b1420;--text:#dbe2f5;--heading:#f1f5f9;--muted:#88929b;--muted-400:#6b7a8a;--card:#18202d;--card-border:#2d3543;--card-hover-border:#3e4850;--section-alt:#0b1420;--nav-bg:rgba(11,20,32,0.85);--nav-border:#2d3543;--input-bg:#141c29;--input-border:#3e4850;--soft-sky:rgba(14,165,233,0.12);--soft-teal:rgba(20,184,166,0.12);--soft-amber:rgba(245,158,11,0.12);--chart-grid:#2d3543;--social-bg:rgba(255,255,255,0.08);--soft-slate:#141c29;--border-light:#2d3543;--hover-bg:rgba(14,165,233,0.08)}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);transition:background 0.3s,color 0.3s}
    h1,h2,h3,h4{font-family:'IBM Plex Sans Arabic',sans-serif;color:var(--heading)}
    .card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;transition:all 0.3s ease}
    .card:hover{box-shadow:0 12px 40px rgba(0,0,0,0.06);border-color:var(--card-hover-border);transform:translateY(-2px)}
    .btn-primary{background:linear-gradient(135deg,#0ea5e9,#14b8a6);color:#fff;transition:all 0.3s;position:relative;overflow:hidden}
    .btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#14b8a6,#0ea5e9);opacity:0;transition:opacity 0.3s}
    .btn-primary:hover::after{opacity:1}
    .btn-primary:hover{box-shadow:0 8px 25px rgba(14,165,233,0.35);transform:translateY(-2px)}
    .btn-primary:active{transform:translateY(0)}
    .btn-primary > *{position:relative;z-index:1}
    .btn-outline{border:1px solid var(--card-border);color:var(--text);transition:all 0.2s;border-radius:12px}
    .btn-outline:hover{border-color:#0ea5e9;color:#0ea5e9;background:var(--hover-bg);transform:translateY(-1px)}
    .btn-ghost{background:transparent;color:var(--muted);transition:all 0.2s;border-radius:12px}
    .btn-ghost:hover{background:var(--hover-bg);color:var(--heading)}
    .btn-ghost:active{transform:scale(0.95)}
    .gradient-text{background:linear-gradient(135deg,#0ea5e9,#14b8a6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .blob{position:fixed;border-radius:50%;filter:blur(80px);opacity:0.3;animation:blob 7s infinite;pointer-events:none;z-index:0}
    .grid-dots{position:fixed;inset:0;opacity:0.015;pointer-events:none;z-index:0;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%230ea5e9' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E")}
    .text-muted{color:var(--muted)}.text-heading{color:var(--heading)}.bg-section{background:var(--section-alt)}.border-light{border-color:var(--border-light)}
    html.dark .text-navy{color:var(--heading)!important}
    html.dark .text-slate-600{color:var(--text)!important}
    html.dark .text-slate-400{color:var(--muted-400)!important}
    html.dark .bg-white{background:var(--card)!important}
    html.dark .bg-sky-100{background:var(--soft-sky)!important}
    html.dark .bg-teal-100{background:var(--soft-teal)!important}
    html.dark .text-sky-700{color:#38bdf8!important}
    html.dark .text-sky-600{color:#38bdf8!important}
    html.dark .text-teal-600{color:#2dd4bf!important}
    html.dark .text-amber-600{color:#fbbf24!important}
    html.dark .bg-sky-50{background:var(--soft-sky)!important}
    html.dark .bg-teal-50{background:var(--soft-teal)!important}
    html.dark .bg-amber-50{background:var(--soft-amber)!important}
    html.dark .border{border-color:var(--border-light)!important}
    html.dark input,html.dark select,html.dark textarea{background:var(--input-bg);border-color:var(--input-border);color:var(--text)}
    html.dark .gradient-text{background:linear-gradient(135deg,#38bdf8,#2dd4bf);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    html.dark .blob{opacity:0.1!important}
    html.dark .bg-red-50{background:rgba(239,68,68,0.12)!important}
    html.dark .text-red-400{color:#f87171!important}
    .badge{font-size:12px;font-weight:600;padding:3px 10px;border-radius:999px;display:inline-block}
    .skeleton{background:linear-gradient(90deg,var(--soft-slate) 25%,var(--card-border) 50%,var(--soft-slate) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:12px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .account-card{cursor:pointer;transition:all 0.3s ease;position:relative;overflow:hidden}
    .account-card:hover{transform:translateY(-4px);box-shadow:0 16px 48px rgba(0,0,0,0.08);border-color:#0ea5e9}
    .account-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#0ea5e9,#14b8a6);opacity:0;transition:opacity 0.3s}
    .account-card:hover::before{opacity:1}
    .form-input{width:100%;padding:10px 14px;border-radius:12px;border:1px solid var(--input-border);background:var(--input-bg);color:var(--text);font-size:14px;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
    .form-input:focus{border-color:#0ea5e9;box-shadow:0 0 0 3px rgba(14,165,233,0.12)}
    .platform-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 12px;border-radius:999px;font-size:12px;font-weight:600}
    .stat-icon{transition:transform 0.3s}
    .card:hover .stat-icon{transform:scale(1.1) rotate(-5deg)}
    .nav-item{display:flex;align-items:center;padding:0.7rem 0.9rem;gap:0.85rem;font-size:14px;font-weight:500;color:var(--muted);transition:all 200ms;cursor:pointer;border-radius:10px;margin-bottom:2px;text-decoration:none}
    .nav-item:hover{background:var(--hover-bg);color:var(--heading)}
    .nav-item.active{color:#0ea5e9;background:rgba(14,165,233,0.08);border-right:3px solid #0ea5e9}
    .nav-item .material-symbols-outlined{font-size:20px}
  </style>
</head>
<body class="antialiased min-h-screen selection:bg-sky-200/50">

  <div class="grid-dots"></div>
  <div class="blob w-[500px] h-[500px] bg-sky-300 top-[-15%] left-[-10%]"></div>
  <div class="blob w-[400px] h-[400px] bg-teal-300 bottom-[-10%] right-[-5%]" style="animation-delay:2s"></div>

  <div class="flex min-h-screen relative z-10">
    <aside id="sidebar" class="w-64 shrink-0 min-h-screen sticky top-0 flex flex-col border-l" style="background:var(--card);border-color:var(--card-border)"></aside>
    <main class="flex-1 p-6 md:p-8 overflow-y-auto">
      <div id="topbar"></div>

      <!-- Stats -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
        <div class="card p-5">
          <div class="flex items-center gap-3">
            <div class="stat-icon w-10 h-10 rounded-xl flex items-center justify-center bg-sky-50">
              <span class="material-symbols-outlined text-sky-600" style="font-variation-settings:'FILL' 1">accounts</span>
            </div>
            <div>
              <p id="lblTotalAccounts" class="text-[13px] text-muted"></p>
              <p class="font-bold text-[22px] text-heading" id="totalAccounts">—</p>
            </div>
          </div>
        </div>
        <div class="card p-5">
          <div class="flex items-center gap-3">
            <div class="stat-icon w-10 h-10 rounded-xl flex items-center justify-center bg-teal-50">
              <span class="material-symbols-outlined text-teal-600" style="font-variation-settings:'FILL' 1">check_circle</span>
            </div>
            <div>
              <p id="lblActiveAccounts" class="text-[13px] text-muted"></p>
              <p class="font-bold text-[22px] text-heading" id="activeAccounts">—</p>
            </div>
          </div>
        </div>
        <div class="card p-5">
          <div class="flex items-center gap-3">
            <div class="stat-icon w-10 h-10 rounded-xl flex items-center justify-center bg-amber-50">
              <span class="material-symbols-outlined text-amber-600" style="font-variation-settings:'FILL' 1">today</span>
            </div>
            <div>
              <p id="lblLastSync" class="text-[13px] text-muted"></p>
              <p class="font-bold text-[14px] text-heading" id="lastSync">—</p>
            </div>
          </div>
        </div>
      </div>

      <!-- Toolbar -->
      <div class="card p-4 mb-6">
        <div class="flex flex-wrap items-center gap-3">
          <div class="relative flex-1 min-w-[200px]">
            <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-muted text-[20px]">search</span>
            <input id="searchInput" class="form-input pl-3 pr-10" placeholder="">
          </div>
          <select id="filterPlatform" class="form-input w-auto min-w-[140px]">
            <option id="optAllPlatforms" value="all"></option>
            <option value="netflix">Netflix</option>
            <option value="crunchyroll">Crunchyroll</option>
            <option value="spotify">Spotify</option>
            <option value="tidal">Tidal</option>
            <option value="canva">Canva</option>
            <option value="microsoft">Microsoft 365</option>
          </select>
          <select id="filterStatus" class="form-input w-auto min-w-[120px]">
            <option id="optAllStatuses" value="all"></option>
            <option id="optStatusActive" value="active"></option>
            <option id="optStatusExpiring" value="expiring"></option>
            <option id="optStatusExpired" value="expired"></option>
            <option id="optStatusSuspended" value="suspended"></option>
          </select>
          <button class="btn-primary px-5 py-2 rounded-xl text-[14px] font-semibold flex items-center gap-1.5" id="btnAddAccount">
            <span class="material-symbols-outlined text-[20px]" style="font-variation-settings:'FILL' 1">add</span>
          </button>
        </div>
      </div>

      <!-- Accounts Grid -->
      <div id="accountsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
        <div class="skeleton h-40"></div>
        <div class="skeleton h-40"></div>
        <div class="skeleton h-40"></div>
        <div class="skeleton h-40"></div>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="addModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4" style="background:rgba(0,0,0,0.5);backdrop-filter:blur(4px)">
    <div class="card p-6 w-full max-w-md" onclick="event.stopPropagation()">
      <div class="flex items-center justify-between mb-5">
        <h3 id="accModalTitle" class="font-ar text-[20px] font-bold text-heading"></h3>
        <button id="closeModal" class="btn-ghost w-9 h-9 flex items-center justify-center rounded-xl">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <form id="addForm" class="space-y-4">
        <div>
          <label id="lblPlatform" class="text-[13px] font-semibold text-heading block mb-1"></label>
          <select id="fieldPlatform" class="form-input" required>
            <option id="optChoosePlatform" value=""></option>
            <option value="netflix">Netflix</option>
            <option value="crunchyroll">Crunchyroll</option>
            <option value="spotify">Spotify</option>
            <option value="tidal">Tidal</option>
            <option value="canva">Canva</option>
            <option value="microsoft">Microsoft 365</option>
          </select>
        </div>
        <div>
          <label id="lblUsername" class="text-[13px] font-semibold text-heading block mb-1"></label>
          <input id="fieldUsername" class="form-input" required>
        </div>
        <div>
          <label id="lblPassword" class="text-[13px] font-semibold text-heading block mb-1"></label>
          <div class="relative">
            <input id="fieldPassword" type="password" class="form-input pl-10" placeholder="••••••••" required>
            <button type="button" id="togglePw" class="absolute left-3 top-1/2 -translate-y-1/2 text-muted hover:text-heading transition-colors">
              <span class="material-symbols-outlined text-[20px]">visibility</span>
            </button>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label id="lblExpiry" class="text-[13px] font-semibold text-heading block mb-1"></label>
            <input id="fieldExpiry" type="date" class="form-input">
          </div>
          <div>
            <label id="lblNotes" class="text-[13px] font-semibold text-heading block mb-1"></label>
            <input id="fieldNotes" class="form-input">
          </div>
        </div>
        <div class="flex gap-3 pt-2">
          <button id="submitAccountBtn" type="submit" class="btn-primary flex-1 py-2.5 rounded-xl font-semibold text-[14px]"></button>
          <button type="button" id="cancelModal" class="btn-outline px-6 py-2.5 rounded-xl text-[14px]"></button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/supabase.js"></script>
  <script src="js/auth-guard.js"></script>
  <script src="js/api.js"></script>
  <script src="js/lang.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
  (async function () {
    try {
      var L = window.RahSahl && window.RahSahl.lang;
      function __(k) { return L ? L.t(k) : k; }

      var ctx = await window.RahSahl.authGuard.guard();
    if (!ctx) return;
    document.title = __('acc.title') + ' — RahSahl';

    var api = window.RahSahl.api;
      var sid = window.RahSahl.sidebar;
      sid.boot();
      window.RahSahl.sidebarCtx = ctx;

      function toast(msg, type) { sid.toast(msg, type); }

    var allAccounts = [];

    function render() {
      document.getElementById('sidebar').innerHTML = sid.renderSidebar(ctx);
      window.RahSahl.sidebar.bindChrome();
      var top = document.getElementById('topbar');
      top.setAttribute('data-title', 'acc.title');
      top.setAttribute('data-subtitle', 'acc.subtitle');
      top.innerHTML = sid.renderTopbar(__('acc.title'), __('acc.subtitle'), ctx);
      updateStats(allAccounts);
      setText('lblTotalAccounts', 'acc.total');
      setText('lblActiveAccounts', 'acc.active');
      setText('lblLastSync', 'acc.last-sync');
      setPlaceholder('searchInput', 'acc.search');
      setText('optAllPlatforms', 'acc.all-platforms');
      setText('optAllStatuses', 'acc.all-statuses');
      setText('optChoosePlatform', 'acc.platform');
      setText('btnAddAccount', 'acc.add');
      setText('accModalTitle', 'acc.add-title');
      setText('lblPlatform', 'acc.platform');
      setText('lblUsername', 'acc.username');
      setText('lblPassword', 'acc.password');
      setText('lblExpiry', 'acc.expiry');
      setText('lblNotes', 'acc.notes');
      setText('cancelModal', 'acc.cancel');
      setText('submitAccountBtn', 'acc.save');
      setText('fieldNotes', 'acc.notes');
      setPlaceholder('fieldUsername', 'acc.placeholder-un');
      setPlaceholder('fieldNotes', 'acc.optional');
      setText('optStatusActive', 'acc.active');
      setText('optStatusExpiring', 'acc.expiring');
      setText('optStatusExpired', 'acc.expired');
      setText('optStatusSuspended', 'acc.suspended');
    }

    function setText(id, key) {
      var el = document.getElementById(id);
      if (el) el.textContent = __(key);
    }

    function setPlaceholder(id, key) {
      var el = document.getElementById(id);
      if (el) el.placeholder = __(key);
    }

    function animateCounter(el, target) {
      if (!el) return;
      var t = parseInt(target) || 0;
      if (t === 0) { el.textContent = '0'; return; }
      var current = 0;
      var step = Math.max(1, Math.floor(t / 40));
      var interval = setInterval(function () {
        current += step;
        if (current >= t) { current = t; clearInterval(interval); }
        el.textContent = current.toLocaleString('ar-DZ');
      }, 25);
    }

    async function loadAccounts() {
      var res = await api.listAccounts();
      allAccounts = res.data ?? [];
      renderAccounts(allAccounts);
      updateStats(allAccounts);
    }

    function updateStats(accounts) {
      var total = accounts.length;
      var active = accounts.filter(function (a) { return (a.status || deriveStatus(a)) === 'active'; }).length;
      animateCounter(document.getElementById('totalAccounts'), total);
      animateCounter(document.getElementById('activeAccounts'), active);
      document.getElementById('lastSync').textContent = new Date().toLocaleDateString('ar-DZ', { hour: '2-digit', minute: '2-digit' });
    }

    var platformColors = { netflix: ['bg-red-50','text-red-600'], crunchyroll: ['bg-orange-50','text-orange-600'], spotify: ['bg-green-50','text-green-600'], tidal: ['bg-sky-100','text-sky-700'], canva: ['bg-purple-50','text-purple-600'], microsoft: ['bg-blue-50','text-blue-600'] };
    var statusColors = { active: 'bg-teal-100 text-teal-700', expiring: 'bg-amber-100 text-amber-700', expired: 'bg-red-100 text-red-600', suspended: 'bg-slate-100 text-muted' };

    function deriveStatus(a) {
      if (!a.is_active) return 'suspended';
      if (a.expiry_date || a.expires_at) {
        var d = a.expiry_date || a.expires_at;
        var now = new Date();
        var exp = new Date(d);
        if (exp < now) return 'expired';
        var week = 7 * 24 * 60 * 60 * 1000;
        if (exp - now < week) return 'expiring';
      }
      return 'active';
    }

    function renderAccounts(accounts) {
      var grid = document.getElementById('accountsGrid');
      if (!accounts.length) {
        grid.innerHTML = '<div class="col-span-full card p-12 text-center"><span class="material-symbols-outlined text-[56px] text-muted" style="font-variation-settings:\'FILL\' 1">account_box</span><p class="text-muted text-[16px] mt-3">' + __('acc.empty') + '</p><button class="btn-primary mt-4 px-6 py-2.5 rounded-xl text-[14px]" onclick="document.getElementById(\'btnAddAccount\').click()">' + __('acc.add-first') + '</button></div>';
        return;
      }
      grid.innerHTML = accounts.map(function (a) {
        var platform = a.platform || a.channel || '—';
        var username = a.username || a.external_id || '—';
        var status = a.status || deriveStatus(a);
        var notes = a.notes || (a.metadata && a.metadata.notes) || '';
        var expiry = a.expiry_date || a.expires_at || null;
        var pc = platformColors[platform] || ['bg-sky-50','text-sky-600'];
        var sc = statusColors[status] || 'bg-soft-slate text-muted';
        return '<div class="card p-5 account-card">'
          + '<div class="flex items-center justify-between mb-3">'
          + '<span class="platform-badge ' + pc[0] + ' ' + pc[1] + '">' + (platform.charAt(0).toUpperCase() + platform.slice(1)) + '</span>'
          + '<span class="badge text-[11px] ' + sc + '">' + __('acc.' + status) + '</span></div>'
          + '<p class="font-semibold text-heading text-[14px] truncate" dir="ltr" style="text-align:right">' + username + '</p>'
          + '<p class="text-[13px] text-muted mt-1.5">' + notes + '</p>'
          + '<div class="flex items-center justify-between mt-4 pt-3" style="border-top:1px solid var(--border-light)">'
          + '<span class="text-[12px] text-muted">' + (expiry ? new Date(expiry).toLocaleDateString('ar-DZ') : __('acc.no-expiry')) + '</span>'
          + '<div class="flex gap-0.5">'
          + '<button class="btn-ghost w-8 h-8 flex items-center justify-center rounded-lg edit-btn" data-id="' + a.id + '"><span class="material-symbols-outlined text-[18px]">edit</span></button>'
          + '<button class="btn-ghost w-8 h-8 flex items-center justify-center rounded-lg text-red-400 delete-btn" data-id="' + a.id + '"><span class="material-symbols-outlined text-[18px]">delete</span></button>'
          + '</div></div></div>';
      }).join('');
    }

    render();
    await loadAccounts();

    // Search & filter
    var filterTimeout;
    function filterAndRender() {
      clearTimeout(filterTimeout);
      filterTimeout = setTimeout(function () {
        var q = document.getElementById('searchInput').value.toLowerCase();
        var pf = document.getElementById('filterPlatform').value;
        var st = document.getElementById('filterStatus').value;
        var filtered = allAccounts;
        if (q) filtered = filtered.filter(function (a) { var u = a.username || a.external_id || ''; return u.toLowerCase().includes(q) || (a.id && a.id.toString().includes(q)); });
        if (pf !== 'all') filtered = filtered.filter(function (a) { return (a.platform || a.channel) === pf; });
        if (st !== 'all') filtered = filtered.filter(function (a) { return (a.status || deriveStatus(a)) === st; });
        renderAccounts(filtered);
      }, 200);
    }
    document.getElementById('searchInput').addEventListener('input', filterAndRender);
    document.getElementById('filterPlatform').addEventListener('change', filterAndRender);
    document.getElementById('filterStatus').addEventListener('change', filterAndRender);

    // Modal
    var modal = document.getElementById('addModal');
    document.getElementById('btnAddAccount').addEventListener('click', function () { modal.classList.remove('hidden'); });
    document.getElementById('closeModal').addEventListener('click', function () { modal.classList.add('hidden'); });
    document.getElementById('cancelModal').addEventListener('click', function () { modal.classList.add('hidden'); });
    modal.addEventListener('click', function (e) { if (e.target === modal) modal.classList.add('hidden'); });

    document.getElementById('togglePw').addEventListener('click', function () {
      var pw = document.getElementById('fieldPassword');
      var icon = document.getElementById('togglePw').querySelector('.material-symbols-outlined');
      if (pw.type === 'password') { pw.type = 'text'; icon.textContent = 'visibility_off'; }
      else { pw.type = 'password'; icon.textContent = 'visibility'; }
    });

    document.getElementById('addForm').addEventListener('submit', async function (e) {
      e.preventDefault();
      var payload = {
        platform: document.getElementById('fieldPlatform').value,
        username: document.getElementById('fieldUsername').value,
        password: document.getElementById('fieldPassword').value,
        expiry_date: document.getElementById('fieldExpiry').value || null,
        notes: document.getElementById('fieldNotes').value || null,
      };
      var btn = e.target.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = __('acc.saving');
      var ret = await api.createAccount(payload);
      btn.disabled = false; btn.textContent = __('acc.save');
      if (ret.error) { alert(__('general.error') + ': ' + ret.error.message); return; }
      modal.classList.add('hidden');
      e.target.reset();
      await loadAccounts();
    });

    // Re-render on language change
    window.addEventListener('langchange', function () {
      render();
    });
  } catch (e) { if (window.RahSahl?.sidebar?.toast) window.RahSahl.sidebar.toast(e.message || 'Error', 'error'); else console.error(e); }
  })();
  </script>

</body>
</html>
