  <style>

    h1,h2,h3,h4{font-family:'IBM Plex Sans Arabic',sans-serif;color:var(--heading)}
    .card{background:var(--card);border:1px solid var(--card-border);border-radius:16px;transition:all 0.3s ease}
    .card:hover{box-shadow:0 12px 40px rgba(0,0,0,0.06);border-color:var(--card-hover-border);transform:translateY(-2px)}

    .btn-primary::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,#14b8a6,#0ea5e9);opacity:0;transition:opacity 0.3s}
    .btn-primary:hover::after{opacity:1}

    <script>
    (async function () {

      document.title = __('nav.settings') + ' — RahSahl';
      var sid = window.RahSahl.sidebar;
      sid.boot();
      window.RahSahl.sidebarCtx = ctx;

      var settingsData, shopData;

      function esc(s) {
        return String(s == null ? '' : s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');

        toast.innerHTML = '<span class="material-symbols-outlined text-[18px]">' + (type === 'error' ? 'error' : 'check_circle') + '</span>' + esc(message);
        document.body.appendChild(toast);
        setTimeout(function () { toast.remove(); }, 3000);

        { value: 'professional', key: 'set.professional' },

          + '      <h2 class="font-ar text-[18px] font-bold text-heading">' + __('set.shop-data') + '</h2>'
          + '    </div>'
          + '    <form id="shopForm" class="space-y-4">'

          + '      <button type="submit" class="btn-primary w-full">' + __('set.save-shop') + '</button>'
          + '    </form>'
          + '  </section>'

          + '  <section class="card p-6 aos aos-delay-1">'

          + '        </select></div>'
          + '      <div><label class="block text-[13px] font-semibold text-heading mb-1.5">' + __('set.language') + '</label>'
          + '        <select id="targetDialect">'

          + '    </form>'

          + '  <section class="card p-6 lg:col-span-2 aos aos-delay-2">'
          + '    <div class="flex items-center gap-3 mb-5">'

          + '        <span class="material-symbols-outlined text-purple-600">vpn_key</span>'
          + '      </div>'
          + '      <h2 class="font-ar text-[18px] font-bold text-heading">' + __('set.api-key') + '</h2>'
          + '    </div>'
          + '    <p class="text-[13px] text-muted mb-4">' + __('set.api-desc') + '</p>'
          + '    <div class="flex items-center gap-2 mb-2">'
          + '      <input id="apiKey" type="text" readonly value="' + esc(shopData ? (shopData.api_secret_prefix || __('set.api-key')) : '') + '" dir="ltr" class="flex-1" style="font-family:monospace"/>'
          + '      <button type="button" id="copyKey" class="btn-outline px-3 py-2 flex items-center rounded-xl">'
          + '        <span class="material-symbols-outlined text-[18px]">content_copy</span>'
          + '      </button>'
          + '    </div>'
          + '    <p class="text-[11px] mb-4" style="color:var(--muted-400)">' + __('set.api-prefix') + '</p>'

          + '  <section class="card p-6 aos aos-delay-3">'

          + '    </div>'

+ '    <button id="btnConnectMeta" class="btn-primary w-full justify-center mb-4 text-[14px]" onclick="connectMeta()">'
+ '      <span class="material-symbols-outlined text-[18px]">add_link</span> ' + __('oauth.connect') + '</button>'

+ '      <div class="text-center py-4 text-[13px] text-muted">' + __('set.loading') + '</div>'

      async function renderLinkedAccounts() {
        var { data: accounts } = await window.RahSahl.api.listLinkedAccounts();
        var container = document.getElementById('linkedAccounts');
        if (!container) return;
        var platformIcons = { instagram: 'auto_awesome', whatsapp: 'chat', messenger: 'messenger', telegram: 'send' };

        if (accounts && accounts.length > 0) {
          container.innerHTML = accounts.map(function (a) {
            return '<div class="flex items-center justify-between py-2.5 px-3 rounded-xl" style="border:1px solid var(--border-light)">'
              + '<div class="flex items-center gap-2.5 min-w-0">'
              + '  <span class="material-symbols-outlined text-sky-600 text-[20px] shrink-0">' + (platformIcons[a.platform] || 'public') + '</span>'
              + '  <div class="min-w-0">'
              + '    <p class="text-[14px] font-semibold text-heading truncate">' + (a.platform.charAt(0).toUpperCase() + a.platform.slice(1)) + '</p>'
              + '    <p class="text-[12px] text-muted truncate">@' + (a.external_handle || a.external_id || '—') + '</p>'
              + '  </div>'
              + '</div>'
              + '<div class="flex items-center gap-2 shrink-0">'
              + '  <span class="badge text-[11px] ' + (a.is_active ? 'bg-teal-100 text-teal-700' : 'bg-red-50 text-red-600') + '">' + (a.is_active ? __('acc.active') : __('acc.suspended')) + '</span>'
              + (a.is_active ? '<button class="btn-ghost text-red-400 text-[13px] px-2 py-1 rounded-lg" onclick="disconnectPlatform(\'' + a.platform + '\')">' + __('oauth.disconnect') + '</button>' : '')
              + '</div>'
              + '</div>';
          }).join('');
        } else {
          container.innerHTML = '<div class="text-center py-6"><span class="material-symbols-outlined text-[36px] text-muted">link_off</span><p class="text-[13px] text-muted mt-2">' + __('set.no-linked') + '</p></div>';
        }
      }

      async function connectMeta() {
        var btn = document.getElementById('btnConnectMeta');
        if (btn) { btn.disabled = true; btn.innerHTML = '<span class="flex items-center gap-2 justify-center"><span class="material-symbols-outlined text-[18px] animate-spin">progress_activity</span> ' + __('oauth.connecting') + '</span>'; }
        try {
          var res = await window.RahSahl.api.getOAuthUrl();
          console.log('OAuth res:', JSON.stringify(res, function(k, v) { if (v instanceof Response) return '(Response ' + v.status + ')'; return v; }));
          if (res.data && res.data.url) {
            window.location.href = res.data.url;
          } else if (res.error) {
            var httpStatus = res.error.context ? res.error.context.status || '?' : '?';
            var errBody = '';
            try { if (res.error.context) errBody = await res.error.context.text().catch(function() { return ''; }); } catch (_) {}
            showToast(__('general.error') + ' (' + httpStatus + '): ' + (errBody || res.error.message || '?'), 'error');
            if (btn) { btn.disabled = false; btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">add_link</span> ' + __('oauth.connect'); }
          } else {
            showToast(__('general.error'), 'error');
            if (btn) { btn.disabled = false; btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">add_link</span> ' + __('oauth.connect'); }
          }
        } catch (e) {
          showToast(__('general.error') + ': ' + e.message, 'error');
          if (btn) { btn.disabled = false; btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">add_link</span> ' + __('oauth.connect'); }
        }
      }

      async function disconnectPlatform(channel) {
        if (!confirm(__('general.confirm'))) return;
        var res = await window.RahSahl.api.disconnectPlatform(channel);
        if (res.error) { showToast(__('general.error') + ': ' + res.error.message, 'error'); return; }
        showToast(__('oauth.disconnected'), 'success');
        renderLinkedAccounts();
      }

      // Expose to global scope for onclick="" in innerHTML
      window.connectMeta = connectMeta;
      window.disconnectPlatform = disconnectPlatform;

      // ---- WhatsApp status + form ----
      async function renderWhatsAppStatus() {
        var { data: accounts } = await window.RahSahl.api.listLinkedAccounts();
        var el = document.getElementById('waStatus');
        if (!el) return;
        var wa = accounts && accounts.find(function (a) { return a.platform === 'whatsapp'; });
        if (wa && wa.is_active) {
          el.className = 'mb-4 p-3 rounded-xl text-[13px] font-semibold flex items-center gap-2 bg-green-50 text-green-600';
          el.innerHTML = '<span class="material-symbols-outlined text-[18px]">check_circle</span> ' + __('wa.connected');
          var form = document.getElementById('waForm');
          if (form) form.style.display = 'none';
        } else {
          el.className = 'mb-4 p-3 rounded-xl text-[13px] font-semibold flex items-center gap-2 bg-red-50 text-red-600';
          el.innerHTML = '<span class="material-symbols-outlined text-[18px]">error</span> ' + __('wa.not-connected');
          var form = document.getElementById('waForm');
          if (form) form.style.display = '';
        }
      }

      async function saveWhatsAppSettings(e) {
        e.preventDefault();
        var btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true; btn.innerHTML = '<span class="flex items-center gap-2 justify-center"><span class="material-symbols-outlined text-[18px] animate-spin">progress_activity</span> ' + __('wa.saving') + '</span>';
        try {
          var phoneId = document.getElementById('waPhoneId').value.trim();
          var businessId = document.getElementById('waBusinessId').value.trim();
          var token = document.getElementById('waToken').value.trim();
          var phone = document.getElementById('waPhone').value.trim();
          if (!phoneId || !token) { showToast(__('general.error'), 'error'); btn.disabled = false; btn.innerHTML = __('wa.save'); return; }
          var res = await window.RahSahl.api.saveWhatsAppConfig({ phone_number_id: phoneId, waba_id: businessId, access_token: token, phone_number: phone });
          btn.disabled = false; btn.innerHTML = __('wa.save');
          if (res.error) { showToast(__('general.error') + ': ' + res.error.message, 'error'); return; }
          showToast(__('wa.saved'), 'success');
          renderWhatsAppStatus();
        } catch (e2) {
          showToast(__('general.error') + ': ' + e2.message, 'error');
          btn.disabled = false; btn.innerHTML = __('wa.save');
        }
      }

      var waForm = document.getElementById('waForm');
      if (waForm) waForm.addEventListener('submit', saveWhatsAppSettings);
      renderWhatsAppStatus();

      // Handle OAuth result from Facebook redirect
      (function checkOAuthResult() {
        var params = new URLSearchParams(window.location.search);
        var oauthStatus = params.get('oauth');
        if (!oauthStatus) return;
        window.history.replaceState({}, '', window.location.pathname);
        if (oauthStatus === 'success') {
          var count = params.get('connected') || '0';
          showToast(__('oauth.success', { count: count }), 'success');
          renderLinkedAccounts();
        } else if (oauthStatus === 'error') {
          var reason = params.get('reason') || '';
          showToast(__('oauth.error', { reason: decodeURIComponent(reason) }), 'error');
        }
      })();

      // Load data
      var results = await Promise.allSettled([
        window.RahSahl.api.getBotSettings(),
        window.RahSahl.api.getShop()
      ]);

      settingsData = results[0].status === 'fulfilled' && results[0].value && !results[0].value.error ? results[0].value.data : null;
      shopData = results[1].status === 'fulfilled' && results[1].value && !results[1].value.error ? results[1].value.data : null;

      if (results[0].value && results[0].value.error) {
        showToast(__('general.error') + ': ' + results[0].value.error.message, 'error');
      }

      render();

      // Shop form
      document.getElementById('shopForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        var btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true; btn.innerHTML = '<span class="flex items-center gap-2 justify-center"><span class="material-symbols-outlined text-[18px] animate-spin">progress_activity</span> ' + __('general.saving') + '</span>';
        var updates = {
          shop_name: document.getElementById('shopName').value.trim(),
          owner_name: document.getElementById('ownerName').value.trim(),
          phone_number: document.getElementById('phoneNumber').value.trim()
        };
        var res = await window.RahSahl.api.updateShop(updates);
        btn.disabled = false; btn.innerHTML = __('set.save-shop');
        if (res.error) showToast(__('general.error') + ': ' + res.error.message, 'error');
        else { showToast(__('general.success'), 'success'); shopData = Object.assign(shopData || {}, updates); }
      });

      // Bot form
      document.getElementById('botForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        var btn = e.target.querySelector('button[type="submit"]');
        btn.disabled = true; btn.innerHTML = '<span class="flex items-center gap-2 justify-center"><span class="material-symbols-outlined text-[18px] animate-spin">progress_activity</span> ' + __('general.saving') + '</span>';
        var updates = {
          response_style: document.getElementById('responseStyle').value,
          target_dialect: document.getElementById('targetDialect').value
        };
        var res = await window.RahSahl.api.updateBotSettings(updates);
        btn.disabled = false; btn.innerHTML = __('set.save-bot');
        if (res.error) showToast(__('general.error') + ': ' + res.error.message, 'error');
        else showToast(__('general.success'), 'success');
      });

      // API key controls
      document.getElementById('copyKey').addEventListener('click', function () {
        var input = document.getElementById('apiKey');
        input.select();
        navigator.clipboard.writeText(input.value);
        showToast(__('general.copied'), 'success');
      });
      document.getElementById('regenerateKey').addEventListener('click', async function () {
        if (!confirm(__('general.confirm'))) return;
        var res = await window.RahSahl.api.regenerateApiKey();
        if (res.error) { showToast(__('general.error') + ': ' + res.error.message, 'error'); return; }
        var newKey = (res.data && (res.data.api_secret || res.data.secret)) || '';
        document.getElementById('newKeyValue').value = newKey;
        document.getElementById('newKeyModal').classList.remove('hidden');
      });
      document.getElementById('copyNewKey').addEventListener('click', function () {
        var input = document.getElementById('newKeyValue');
        input.select();
        navigator.clipboard.writeText(input.value);
        showToast(__('general.copied'), 'success');
      });
      document.getElementById('closeNewKey').addEventListener('click', function () {
        document.getElementById('newKeyModal').classList.add('hidden');
        showToast(__('general.success'), 'success');
      });

      // Re-render on language change
      window.addEventListener('langchange', function () {
        render();
      });
    } catch (e) { if (window.RahSahl?.sidebar?.toast) window.RahSahl.sidebar.toast(e.message || 'Error', 'error'); else console.error(e); }
    })();
    </script>

  </body>
  </html>
