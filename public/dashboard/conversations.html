<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta name="theme-color" content="#f5f0eb">
<title>RahSahl</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{navy:'#0b1420',sky:'#0ea5e9',amber:'#f59e0b',teal:'#14b8a6'},fontFamily:{ar:['IBM Plex Sans Arabic','sans-serif'],en:['Inter','sans-serif']}}}}</script>
<style>
:root{--bg:#f5f0eb;--text:#334155;--heading:#0b1420;--muted:#64748b;--muted-400:#94a3b8;--card:#fff;--card-border:#e2e8f0;--card-hover-border:#cbd5e1;--input-bg:#fff;--input-border:#e2e8f0;--soft-sky:#e0f2fe;--soft-teal:#ccfbf1;--soft-amber:#fef3c7;--soft-slate:#f8fafc;--border-light:#e2e8f0;--hover-bg:rgba(14,165,233,0.04)}
html.dark{--bg:#0b1420;--text:#dbe2f5;--heading:#f1f5f9;--muted:#88929b;--muted-400:#6b7a8a;--card:#18202d;--card-border:#2d3543;--card-hover-border:#3e4850;--input-bg:#141c29;--input-border:#3e4850;--soft-sky:rgba(14,165,233,0.12);--soft-teal:rgba(20,184,166,0.12);--soft-amber:rgba(245,158,11,0.12);--soft-slate:#141c29;--border-light:#2d3543;--hover-bg:rgba(14,165,233,0.08)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);transition:background 0.3s,color 0.3s}
h1,h2,h3,h4{font-family:'IBM Plex Sans Arabic',sans-serif;color:var(--heading)}
.text-muted{color:var(--muted)}.text-heading{color:var(--heading)}
html.dark .text-navy{color:var(--heading)!important}
html.dark .text-slate-600{color:var(--text)!important}
html.dark .text-slate-400{color:var(--muted-400)!important}
html.dark .bg-white{background:var(--card)!important}
html.dark .bg-sky-100{background:var(--soft-sky)!important}
html.dark .bg-teal-100{background:var(--soft-teal)!important}
html.dark .bg-amber-100{background:var(--soft-amber)!important}
</style>
<link href="css/styles.css" rel="stylesheet"/>
</head>
<body>
<nav class="sidenav" id="sidebar"></nav>
<main class="main-content" id="main"></main>

<script src="js/supabase.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/api.js"></script>
<script src="js/lang.js"></script>
<script src="js/sidebar.js"></script>
<script>
(async function () {
  try {
  var ctx = await window.RahSahl.authGuard.guard();
  if (!ctx) return;
  document.title = __('conv.title') + ' — RahSahl';
  window.RahSahl.sidebar.boot();
  window.RahSahl.sidebarCtx = ctx;
  document.getElementById('sidebar').innerHTML = window.RahSahl.sidebar.renderSidebar(ctx);
  window.RahSahl.sidebar.bindChrome();

  var activeFilter = 'all';

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function timeAgo(iso) {
    if (!iso) return '';
    var d = new Date(iso);
    var diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return __('general.now');
    if (diff < 3600) return Math.floor(diff / 60) + ' ' + __('general.min');
    if (diff < 86400) return Math.floor(diff / 3600) + ' ' + __('general.hour');
    if (diff < 604800) return Math.floor(diff / 86400) + ' ' + __('general.day');
    return d.toLocaleDateString();
  }

  function channelImg(ch) {
    var slug = { whatsapp: 'whatsapp', messenger: 'messenger', instagram: 'instagram' }[ch] || '';
    return slug ? '<img src="https://cdn.simpleicons.org/' + slug + '" style="width:18px;height:18px;display:block" alt="">' : '<span class="material-symbols-outlined text-[18px]">forum</span>';
  }

  function channelBg(ch) {
    return { whatsapp: 'bg-emerald-100', messenger: 'bg-blue-100', instagram: 'bg-purple-100' }[ch] || 'bg-slate-100';
  }

  var FILTERS = ['all', 'messenger', 'instagram', 'whatsapp'];

  function render() {
    var filtered = activeFilter === 'all' ? senders : senders.filter(function (s) {
      return s.channels.indexOf(activeFilter) !== -1;
    });

    document.getElementById('main').innerHTML = window.RahSahl.sidebar.renderTopbar(
      __('conv.title'), filtered.length + ' ' + __('conv.active'), ctx
    ) + ''

    // Filter pills
    + '<div class="flex gap-2 mb-4 flex-wrap" id="filterPills">'
    + FILTERS.map(function (f) {
        var label = f === 'all' ? __('general.all') : ({ messenger: __('ms.title'), instagram: __('ig.title'), whatsapp: 'WhatsApp' }[f] || f);
        var slug = f === 'all' ? '' : ({ messenger: 'messenger', instagram: 'instagram', whatsapp: 'whatsapp' }[f] || '');
        var active = f === activeFilter ? 'bg-navy text-white' : '';
        return '<button class="flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-[12px] font-semibold transition ' + active + '" style="border:1px solid var(--border-light)" onclick="window._filterConv(\'' + f + '\')">'
          + (slug ? '<img src="https://cdn.simpleicons.org/' + slug + '" style="width:14px;height:14px;display:block" alt="">' : '')
          + esc(label) + '</button>';
      }).join('')
    + '</div>'

    // Conversations list
    + (filtered.length === 0
      ? '<div class="empty-state"><span class="material-symbols-outlined">forum</span><p class="mt-2 text-[14px]">' + __('conv.empty') + '</p></div>'
      : '<div class="flex flex-col gap-2">' + filtered.map(function (s) {
          var bg = channelBg(s.last_message.channel || 'direct');
          return ''
            + '<details class="rounded-xl" style="border:1px solid var(--border-light);background:var(--card)">'
            + '  <summary class="flex items-center gap-3 p-3 cursor-pointer" style="border-radius:0.75rem">'
            + '    <div class="' + bg + ' w-9 h-9 rounded-xl flex items-center justify-center shrink-0">' + channelImg(s.last_message.channel || '') + '</div>'
            + '    <div class="flex-1 min-w-0">'
            + '      <div class="flex justify-between items-center mb-0.5">'
            + '        <h4 class="font-semibold text-heading text-[14px]" dir="ltr">' + esc(s.sender_id.substring(0, 24)) + '</h4>'
            + '        <span class="text-[11px] text-muted">' + timeAgo(s.last_message.created_at) + '</span>'
            + '      </div>'
            + '      <p class="text-[12px] text-muted truncate">' + esc((s.last_message.message || '').substring(0, 100)) + '</p>'
            + '    </div>'
            + '    <span class="badge text-[11px] shrink-0 bg-teal-100 text-teal-700">' + s.count + '</span>'
            + '  </summary>'
            + '  <div class="border-t p-4 space-y-3" style="border-color:var(--border-light);background:var(--soft-slate)">' + s.messages.map(function (m) {
                var isUser = m.role === 'user';
                var bg2 = channelBg(m.channel || '');
                return ''
                  + '<div class="flex items-start gap-2 ' + (isUser ? '' : 'flex-row-reverse') + '">'
                  + '  <div class="' + bg2 + ' w-7 h-7 rounded-lg flex items-center justify-center shrink-0">'
                  + (isUser ? '<span class="material-symbols-outlined text-[14px]">person</span>' : '<span class="material-symbols-outlined text-[14px] text-sky-600">smart_toy</span>')
                  + '  </div>'
                  + '  <div class="flex-1 max-w-[80%] rounded-xl p-2.5" style="background:' + (isUser ? 'var(--card)' : 'var(--soft-sky)') + '">'
                  + '    <p class="text-[13px] text-heading leading-relaxed">' + esc(m.message) + '</p>'
                  + '    <p class="text-[10px] text-muted mt-1 text-left">' + timeAgo(m.created_at) + (m.channel ? ' · ' + esc(m.channel) : '') + '</p>'
                  + '  </div>'
                  + '</div>';
              }).join('') + '</div>'
            + '</details>';
        }).join('') + '</div>');
  }

  window._filterConv = function (f) {
    activeFilter = f;
    render();
  };

  // Load all conversations grouped by sender
  document.getElementById('main').innerHTML = window.RahSahl.sidebar.renderTopbar(__('conv.title'), '...', ctx)
    + '<div class="card p-12"><div class="skeleton h-32"></div></div>';

  var res = await window.RahSahl.api.listConversations({ limit: 300 });
  if (res.error) {
    document.getElementById('main').innerHTML = window.RahSahl.sidebar.renderTopbar(__('conv.title'), '', ctx)
      + '<div class="empty-state"><span class="material-symbols-outlined text-red-500">error</span><p class="mt-2">' + __('conv.load-fail') + ': ' + esc(res.error.message) + '</p></div>';
    return;
  }

  var conversations = res.data || [];
  var grouped = {};
  conversations.forEach(function (c) {
    var key = c.sender_id || 'unknown';
    if (!grouped[key]) grouped[key] = [];
    grouped[key].push(c);
  });

  var senders = Object.keys(grouped).map(function (k) {
    var msgs = grouped[k].sort(function (a, b) { return new Date(a.created_at) - new Date(b.created_at); });
    return {
      sender_id: k,
      messages: msgs,
      last_message: msgs[msgs.length - 1],
      count: msgs.length,
      channels: Array.from(new Set(msgs.map(function (m) { return m.channel || 'direct'; })))
    };
  }).sort(function (a, b) {
    return new Date(b.last_message.created_at) - new Date(a.last_message.created_at);
  });

  render();

  window.addEventListener('langchange', function () { render(); });
} catch (e) { console.error(e); if (window.RahSahl?.sidebar?.toast) window.RahSahl.sidebar.toast(e.message || 'Error', 'error'); }
})();
</script>
</body>
</html>
