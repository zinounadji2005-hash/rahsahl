<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>__('api.title') — RahSahl</title>
<link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{navy:'#0b1420',sky:'#0ea5e9',amber:'#f59e0b',teal:'#14b8a6'},fontFamily:{ar:['IBM Plex Sans Arabic','sans-serif'],en:['Inter','sans-serif']}}}}</script>
<style>
:root{--bg:#f5f0eb;--text:#334155;--heading:#0b1420;--muted:#64748b;--muted-400:#94a3b8;--card:#fff;--card-border:#e2e8f0;--card-hover-border:#cbd5e1;--input-bg:#fff;--input-border:#e2e8f0;--soft-sky:#e0f2fe;--soft-teal:#ccfbf1;--soft-amber:#fef3c7;--soft-slate:#f8fafc;--border-light:#e2e8f0;--hover-bg:rgba(14,165,233,0.04)}
html.dark{--bg:#0b1420;--text:#dbe2f5;--heading:#f1f5f9;--muted:#88929b;--muted-400:#6b7a8a;--card:#18202d;--card-border:#2d3543;--card-hover-border:#3e4850;--input-bg:#141c29;--input-border:#3e4850;--soft-sky:rgba(14,165,233,0.12);--soft-teal:rgba(20,184,166,0.12);--soft-amber:rgba(245,158,11,0.12);--soft-slate:#141c29;--border-light:#2d3543;--hover-bg:rgba(14,165,233,0.08)}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);transition:background 0.3s,color 0.3s}
h1,h2,h3,h4{font-family:'IBM Plex Sans Arabic',sans-serif;color:var(--heading)}
.text-muted{color:var(--muted)}.text-heading{color:var(--heading)}
html.dark .text-navy{color:var(--heading)!important}
html.dark .text-slate-600{color:var(--text)!important}
html.dark .text-slate-400{color:var(--muted-400)!important}
html.dark .bg-white{background:var(--card)!important}
html.dark .bg-sky-100{background:var(--soft-sky)!important}
html.dark .bg-teal-100{background:var(--soft-teal)!important}
html.dark .bg-amber-100{background:var(--soft-amber)!important}
</style>
<link href="css/styles.css" rel="stylesheet"/>
</head>
<body>
<nav class="sidenav" id="sidebar"></nav>
<main class="main-content" id="main"></main>

<script src="js/supabase.js"></script>
<script src="js/auth-guard.js"></script>
<script src="js/api.js"></script>
<script src="js/lang.js"></script>
<script src="js/sidebar.js"></script>
<script>
(async function () {
  var ctx = await window.RahSahl.authGuard.guard();
  if (!ctx) return;
  window.RahSahl.sidebar.boot();
  window.RahSahl.sidebarCtx = ctx;
  document.getElementById('sidebar').innerHTML = window.RahSahl.sidebar.renderSidebar(ctx);

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function toast(msg, type) {
    var el = document.createElement('div');
    el.className = 'fixed top-6 left-1/2 -translate-x-1/2 z-50 px-5 py-3 rounded-2xl shadow-lg text-white text-[14px] font-semibold flex items-center gap-2 ' + (type === 'error' ? 'bg-red-500' : 'bg-teal-500');
    el.innerHTML = '<span class="material-symbols-outlined text-[18px]">' + (type === 'error' ? 'error' : 'check_circle') + '</span>' + esc(msg);
    document.body.appendChild(el);
    setTimeout(function () { el.remove(); }, 3000);
  }

  function timeAgo(iso) {
    if (!iso) return '—';
    var d = new Date(iso);
    var diff = (Date.now() - d.getTime()) / 1000;
    if (diff < 60) return __('general.now');
    if (diff < 3600) return __('general.ago') + ' ' + Math.floor(diff / 60) + ' ' + __('general.min');
    if (diff < 86400) return __('general.ago') + ' ' + Math.floor(diff / 3600) + ' ' + __('general.hour');
    if (diff < 604800) return __('general.ago') + ' ' + Math.floor(diff / 86400) + ' ' + __('general.day');
    return d.toLocaleDateString('ar-DZ');
  }

  function render(shop, audit) {
    var prefix = shop ? (shop.api_secret_prefix || __('api.not-generated')) : '—';
    var lastUsed = shop && shop.api_secret_last_used ? timeAgo(shop.api_secret_last_used) : __('api.not-used');

    document.getElementById('main').innerHTML = window.RahSahl.sidebar.renderTopbar(__('api.title'), __('api.subtitle'), ctx)
      + ''
      + '<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">'
      + '  <section class="card p-6 lg:col-span-2">'
      + '    <div class="flex items-center gap-3 mb-5">'
      + '      <div class="bg-purple-50 text-purple-600 p-2.5 rounded-xl">'
      + '        <span class="material-symbols-outlined">vpn_key</span>'
      + '      </div>'
      + '      <div>'
      + '        <h2 class="font-ar text-[18px] font-bold">' + __('api.current-key') + '</h2>'
      + '        <p class="text-[12px] text-slate-500">' + __('api.desc') + '</p>'
      + '      </div>'
      + '    </div>'
      + '    <div class="space-y-4">'
      + '      <div>'
      + '        <label class="block text-[13px] font-semibold text-navy mb-1.5">' + __('api.prefix') + '</label>'
      + '        <div class="flex items-center gap-2">'
      + '          <input id="apiKey" type="text" readonly value="' + esc(prefix) + '" dir="ltr" class="flex-1" style="font-family:monospace;background:var(--soft-slate)"/>'
      + '          <button type="button" id="copyKey" class="btn-outline px-3">'
      + '            <span class="material-symbols-outlined text-[18px]">content_copy</span>'
      + '          </button>'
      + '        </div>'
      + '        <p class="text-[11px] text-slate-400 mt-1">' + __('api.prefix-safe') + '</p>'
      + '      </div>'
      + '      <div class="flex items-center justify-between p-3 rounded-xl" style="background:var(--soft-slate)">'
      + '        <span class="text-[13px] text-slate-500">' + __('api.last-used') + '</span>'
      + '        <span class="text-[13px] font-semibold text-navy">' + lastUsed + '</span>'
      + '      </div>'
      + '      <button type="button" id="regenerateKey" class="btn-secondary w-full">'
      + '        <span class="material-symbols-outlined text-[18px]">refresh</span>'
      + '        ' + __('api.regenerate')
      + '      </button>'
      + '    </div>'
      + '  </section>'

      + '  <section class="card p-6">'
      + '    <div class="flex items-center gap-3 mb-5">'
      + '      <div class="bg-amber-50 text-amber-600 p-2.5 rounded-xl">'
      + '        <span class="material-symbols-outlined">bolt</span>'
      + '      </div>'
      + '      <div>'
      + '        <h2 class="font-ar text-[18px] font-bold">' + __('api.webhook') + '</h2>'
      + '        <p class="text-[12px] text-slate-500">' + __('api.webhook-desc') + '</p>'
      + '      </div>'
      + '    </div>'
      + '    <code class="block p-3 rounded-lg text-[11px] break-all" dir="ltr" style="background:var(--soft-slate);color:var(--text)">http://ec2-34-228-227-112.compute-1.amazonaws.com/webhook/v1/social-inbound</code>'
      + '    <div class="mt-4 p-3 rounded-xl bg-amber-50 border border-amber-100">'
      + '      <p class="text-[12px] text-amber-700 leading-relaxed">'
      + '        <span class="font-bold">' + __('api.webhook-note') + '</span> ' + __('api.webhook-hmac') + ' <code class="text-[10px]">X-RahSahl-Signature</code> ' + __('api.webhook-secure')
      + '      </p>'
      + '    </div>'
      + '  </section>'

      + '  <section class="card p-6 lg:col-span-3">'
      + '    <div class="flex items-center gap-3 mb-5">'
      + '      <div class="bg-slate-100 text-slate-600 p-2.5 rounded-xl">'
      + '        <span class="material-symbols-outlined">history</span>'
      + '      </div>'
      + '      <div>'
      + '        <h2 class="font-ar text-[18px] font-bold">' + __('api.audit-log') + '</h2>'
      + '        <p class="text-[12px] text-slate-500">' + __('api.audit-desc') + '</p>'
      + '      </div>'
      + '    </div>'
      + (audit.length === 0
          ? '<div class="empty-state"><span class="material-symbols-outlined">history</span><p class="mt-2 text-[14px]">' + __('api.audit-empty') + '</p></div>'
          : '<div class="table-wrap">'
          + '  <table class="data-table">'
          + '    <thead><tr><th>' + __('api.col-action') + '</th><th>' + __('api.col-status') + '</th><th>' + __('api.col-ip') + '</th><th>' + __('api.col-browser') + '</th><th>' + __('api.col-date') + '</th></tr></thead>'
          + '    <tbody>' + audit.map(function (a) {
                return '<tr>'
                  + '<td><span class="font-semibold">' + esc(a.action) + '</span></td>'
                  + '<td><span class="pill ' + (a.success ? 'pill-success' : 'pill-error') + '">' + (a.success ? __('api.success') : __('api.failed')) + '</span></td>'
                  + '<td dir="ltr" class="text-[12px]">' + esc(a.ip_address || '—') + '</td>'
                  + '<td class="text-[12px] text-slate-500 truncate max-w-[200px]">' + esc(a.user_agent || '—') + '</td>'
                  + '<td class="text-[12px] text-slate-500">' + timeAgo(a.created_at) + '</td>'
                  + '</tr>';
              }).join('') + '</tbody></table></div>')
      + '  </section>'
      + '</div>'

      + '<div id="newKeyModal" class="hidden fixed inset-0 z-50 bg-black/40 flex items-center justify-center p-4">'
      + '  <div class="card p-6 max-w-lg w-full">'
      + '    <div class="flex items-center gap-2 mb-3 text-amber-600">'
      + '      <span class="material-symbols-outlined">warning</span>'
      + '      <h3 class="font-bold text-[16px]">' + __('api.save-now') + '</h3>'
      + '    </div>'
      + '    <p class="text-[13px] text-slate-600 mb-3">' + __('api.show-once') + '</p>'
      + '    <input id="newKeyValue" type="text" readonly dir="ltr" class="w-full mb-3" style="font-family:monospace"/>'
      + '    <div class="flex gap-2">'
      + '      <button type="button" id="copyNewKey" class="btn-primary flex-1">' + __('api.copy') + '</button>'
      + '      <button type="button" id="closeNewKey" class="btn-outline">' + __('api.done') + '</button>'
      + '    </div>'
      + '  </div>'
      + '</div>';

    document.getElementById('copyKey').addEventListener('click', function () {
      var input = document.getElementById('apiKey');
      input.select();
      navigator.clipboard.writeText(input.value);
      toast(__('api.copied-prefix'), 'success');
    });

    document.getElementById('regenerateKey').addEventListener('click', async function () {
      if (!confirm(__('api.regenerate-confirm'))) return;
      var btn = this;
      btn.disabled = true; btn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> ' + __('api.generating');
      var res = await window.RahSahl.api.regenerateApiKey();
      btn.disabled = false; btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">refresh</span> ' + __('api.regenerate');
      if (res.error) { toast(__('api.failed') + ': ' + res.error.message, 'error'); return; }
      var newKey = (res.data && (res.data.api_secret || res.data.secret)) || '';
      document.getElementById('newKeyValue').value = newKey;
      document.getElementById('newKeyModal').classList.remove('hidden');
      // Reload to refresh prefix
      setTimeout(load, 2000);
    });

    document.getElementById('copyNewKey').addEventListener('click', function () {
      var input = document.getElementById('newKeyValue');
      input.select();
      navigator.clipboard.writeText(input.value);
      toast(__('api.copied-new'), 'success');
    });
    document.getElementById('closeNewKey').addEventListener('click', function () {
      document.getElementById('newKeyModal').classList.add('hidden');
      toast(__('api.generated'), 'success');
    });
  }

  async function load() {
    document.getElementById('main').innerHTML = window.RahSahl.sidebar.renderTopbar(__('api.title'), '...', ctx)
      + '<div class="card p-12"><div class="skeleton h-32"></div></div>';

    var results = await Promise.allSettled([
      window.RahSahl.api.getShop(),
      window.RahSahl.api.listApiKeyAudit()
    ]);

    var shop = results[0].status === 'fulfilled' && !results[0].value.error ? results[0].value.data : null;
    var audit = results[1].status === 'fulfilled' && !results[1].value.error ? (results[1].value.data || []) : [];
    render(shop, audit);
  }

  load();
  window.addEventListener('langchange', function () { load(); });
})();
</script>
</body>
</html>
