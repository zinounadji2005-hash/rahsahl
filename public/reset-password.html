<!DOCTYPE html>
<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<meta name="theme-color" content="#f5f0eb">
<meta name="description" content="تعيين كلمة مرور جديدة - راه ساهل">
<title>تعيين كلمة مرور جديدة - راه ساهل</title>
<link rel="canonical" href="https://rahsahl.com/reset-password.html">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://rvjsnkolroaakskvvwnv.supabase.co">
<link rel="preconnect" href="https://cdn.tailwindcss.com">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.googleapis.com">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/auth.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{navy:'#0b1420',sky:'#0ea5e9',amber:'#f59e0b',teal:'#14b8a6'},fontFamily:{ar:['IBM Plex Sans Arabic','sans-serif'],en:['Inter','sans-serif']}}}}</script>
<style>
body{font-family:'Inter',sans-serif;background:var(--bg,#f5f0eb);color:var(--text,#334155)}
h1,h2,h3,h4{font-family:'IBM Plex Sans Arabic',sans-serif}
.glass-panel{background:var(--card,#fff);border:1px solid var(--card-border,#e2e8f0);border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.04)}
.btn-primary{background:linear-gradient(135deg,#0ea5e9,#14b8a6);color:#fff;transition:all 0.3s}
.btn-primary:hover{box-shadow:0 8px 25px rgba(14,165,233,0.3);transform:translateY(-1px)}
.input-focus{border:1px solid var(--card-border,#e2e8f0);transition:all 0.2s}
.input-focus:focus{border-color:#0ea5e9;box-shadow:0 0 0 3px rgba(14,165,233,0.12);outline:none}
input{background:var(--input-bg,#fff)!important}
html.dark{--bg:#0b1420;--text:#dbe2f5;--heading:#f1f5f9;--muted:#88929b;--card:#18202d;--card-border:#2d3543;--input-bg:#141c29;--input-border:#3e4850}
html.dark .text-navy{color:var(--heading)!important}
html.dark img[src*="logo.svg"]{filter:brightness(0) invert(1)}
#darkToggle{width:40px;height:40px;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1px solid var(--card-border,#e2e8f0);background:var(--card,#fff);cursor:pointer;transition:all 0.2s;color:var(--muted,#94a3b8)}
#darkToggle:hover{color:var(--heading,#0b1420);border-color:var(--card-hover-border,var(--card-border))}
.password-strength{height:4px;border-radius:2px;transition:all 0.3s;margin-top:6px}
</style>
</head>
<body class="min-h-screen flex items-center justify-center antialiased selection:bg-sky-200/50 p-4" style="background:var(--bg,#f5f0eb);color:var(--text,#334155)">
<div class="absolute top-4 left-4 z-50"><button id="darkToggle" title="الوضع الليلي"><span class="material-symbols-outlined dark:hidden text-[20px]">dark_mode</span><span class="material-symbols-outlined hidden dark:inline text-[20px]">light_mode</span></button></div>
<div class="w-full max-w-md glass-panel p-8 relative">
  <div class="text-center mb-6">
    <img alt="RahSahl" class="h-12 w-auto mx-auto mb-4" src="assets/logo.svg"/>
    <h1 class="font-ar text-[26px] font-bold mb-2" style="color:var(--heading,#0b1420)">تعيين كلمة مرور جديدة</h1>
    <p class="text-[15px]" style="color:var(--muted,#64748b)">أدخل كلمة المرور الجديدة لحسابك</p>
  </div>
  <div id="loading-state" class="text-center py-8">
    <span class="material-symbols-outlined animate-spin text-[40px] text-sky-500">sync</span>
    <p class="mt-3 text-[14px]" style="color:var(--muted,#64748b)">جاري التحقق من الرابط...</p>
  </div>
  <div id="auth-error" class="hidden bg-red-50 border border-red-200 text-red-600 text-[14px] px-4 py-2.5 rounded-lg mb-4"></div>
  <div id="auth-success" class="hidden bg-emerald-50 border border-emerald-200 text-emerald-700 text-[14px] px-4 py-2.5 rounded-lg mb-4"></div>
  <form class="space-y-5 hidden" id="reset-form">
    <div><label class="block text-[14px] font-semibold mb-1.5" for="password" style="color:var(--heading,#475569)">كلمة المرور الجديدة</label><div class="relative"><span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" style="color:var(--muted,#94a3b8)">lock</span><input class="w-full input-focus text-[15px] rounded-xl py-3 pr-11 pl-3" id="password" style="color:var(--heading,#0b1420);background:var(--input-bg,#fff);border-color:var(--card-border,#e2e8f0)" dir="ltr" placeholder="••••••••" required="" type="password" minlength="6"/></div><div class="password-strength" id="pwStrength" style="width:0;background:#e2e8f0"></div><p class="text-[11px] text-slate-400 mt-1">يجب أن تكون 6 أحرف على الأقل</p></div>
    <div><label class="block text-[14px] font-semibold mb-1.5" for="confirm" style="color:var(--heading,#475569)">تأكيد كلمة المرور</label><div class="relative"><span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none" style="color:var(--muted,#94a3b8)">lock</span><input class="w-full input-focus text-[15px] rounded-xl py-3 pr-11 pl-3" id="confirm" style="color:var(--heading,#0b1420);background:var(--input-bg,#fff);border-color:var(--card-border,#e2e8f0)" dir="ltr" placeholder="••••••••" required="" type="password"/></div></div>
    <button class="w-full btn-primary text-[15px] font-semibold rounded-xl py-3 flex justify-center items-center gap-2" type="submit" id="submitBtn"><span>تعيين كلمة المرور</span><span class="material-symbols-outlined text-[18px]">check</span></button>
  </form>
  <div class="mt-6 text-center hidden" id="login-link"><p class="text-[14px]" style="color:var(--muted,#64748b)"><a class="text-[15px] font-semibold text-sky-600 hover:text-sky-700 transition-colors" href="login.html">تسجيل الدخول</a></p></div>
</div>
<script>
(function(){var t=document.getElementById('darkToggle'),d=document.documentElement;if(localStorage.getItem('rahsahl-dark')==='true')d.classList.add('dark');t&&t.addEventListener('click',function(){d.classList.toggle('dark');localStorage.setItem('rahsahl-dark',d.classList.contains('dark')?'true':'false')})})();

var supabase=RahSahlAuth.init();
var loadingEl=document.getElementById('loading-state');
var formEl=document.getElementById('reset-form');
var errEl=document.getElementById('auth-error');
var successEl=document.getElementById('auth-success');
var loginLink=document.getElementById('login-link');

async function initReset(){
  if(!supabase){loadingEl.innerHTML='<span class="material-symbols-outlined text-[40px] text-red-500">error</span><p class="mt-3 text-[14px]">خطأ في الاتصال</p>';return}
  try{
    var sess=await supabase.auth.getSession();
    var type=sess.data.session?.user?.email_confirmed_at?'recovery':null;
    if(!type&&window.location.hash.includes('type=recovery'))type='recovery';
    if(type==='recovery'){
      loadingEl.classList.add('hidden');
      formEl.classList.remove('hidden');
    }else{
      loadingEl.innerHTML='<span class="material-symbols-outlined text-[40px] text-amber-500">link_off</span><p class="mt-3 text-[14px]">رابط غير صالح أو منتهي الصلاحية.</p>';
      loginLink.classList.remove('hidden');
    }
  }catch(e){
    loadingEl.innerHTML='<span class="material-symbols-outlined text-[40px] text-red-500">error</span><p class="mt-3 text-[14px]">'+(e.message||'حدث خطأ')+'</p>';
    loginLink.classList.remove('hidden');
  }
}

initReset();

document.getElementById('password').addEventListener('input',function(){
  var v=this.value.length;
  var bar=document.getElementById('pwStrength');
  if(v===0){bar.style.width='0';bar.style.background='#e2e8f0'}
  else if(v<6){bar.style.width=(v/6*100)+'%';bar.style.background='#f87171'}
  else if(v<10){bar.style.width='60%';bar.style.background='#fbbf24'}
  else{bar.style.width='100%';bar.style.background='#34d399'}
});

formEl.addEventListener('submit',async function(e){
  e.preventDefault();
  var pw=document.getElementById('password').value,confirm=document.getElementById('confirm').value;
  if(pw.length<6){errEl.textContent='كلمة المرور يجب أن تكون 6 أحرف على الأقل';errEl.classList.remove('hidden');successEl.classList.add('hidden');return}
  if(pw!==confirm){errEl.textContent='كلمة المرور غير متطابقة';errEl.classList.remove('hidden');successEl.classList.add('hidden');return}
  errEl.classList.add('hidden');successEl.classList.add('hidden');
  var btn=document.getElementById('submitBtn');btn.disabled=true;btn.innerHTML='<span class="material-symbols-outlined animate-spin">sync</span> جاري الحفظ...';
  try{
    var r=await supabase.auth.updateUser({password:pw});
    if(r.error)throw r.error;
    successEl.textContent='تم تغيير كلمة المرور بنجاح!';successEl.classList.remove('hidden');
    btn.innerHTML='تم ✓';formEl.classList.add('hidden');loginLink.classList.remove('hidden');
  }catch(e){
    errEl.textContent=e.message||'فشل تغيير كلمة المرور';
    errEl.classList.remove('hidden');
    btn.disabled=false;btn.innerHTML='<span>تعيين كلمة المرور</span><span class="material-symbols-outlined">check</span>';
  }
});
</script>
</body></html>
